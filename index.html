<script type="text/babel" data-presets="react" data-label="Scanner+real-analysis">
(function(){
/* global React, faceapi */
const { useState, useEffect, useRef, useCallback } = React;

// ============================================================================
// REAL SCANNER — color science + face-api.js
// ============================================================================

// ── Skin detection (YCbCr + HSV) ─────────────────────────────────────────────
function isSkin(r,g,b){
  const y  = 0.299*r + 0.587*g + 0.114*b;
  const cb = 128 + (-0.168736*r - 0.331264*g + 0.5*b);
  const cr = 128 + (0.5*r - 0.418688*g - 0.081312*b);
  const ycbcr = cb>=77 && cb<=127 && cr>=133 && cr<=173;
  const max = Math.max(r,g,b), min = Math.min(r,g,b);
  const v = max/255;
  const s = max===0?0:(max-min)/max;
  const hsv = v>0.25 && s>=0.08 && s<=0.68;
  return ycbcr && hsv;
}
// ── CIELab + ITA ─────────────────────────────────────────────────────────────
function rgbToLab(r,g,b){
  let R=r/255,G=g/255,B=b/255;
  R = R>0.04045 ? Math.pow((R+0.055)/1.055,2.4) : R/12.92;
  G = G>0.04045 ? Math.pow((G+0.055)/1.055,2.4) : G/12.92;
  B = B>0.04045 ? Math.pow((B+0.055)/1.055,2.4) : B/12.92;
  const X=(R*0.4124+G*0.3576+B*0.1805)/0.95047;
  const Y=(R*0.2126+G*0.7152+B*0.0722)/1.00000;
  const Z=(R*0.0193+G*0.1192+B*0.9505)/1.08883;
  const f=t=>t>0.008856?Math.cbrt(t):(7.787*t+16/116);
  const fx=f(X),fy=f(Y),fz=f(Z);
  return {L:116*fy-16, a:500*(fx-fy), b:200*(fy-fz)};
}
function deltaE(l1,l2){
  return Math.sqrt((l1.L-l2.L)**2+(l1.a-l2.a)**2+(l1.b-l2.b)**2);
}
function itaLabel(ita){
  if(ita>55) return 'Very Light';
  if(ita>41) return 'Light';
  if(ita>28) return 'Intermediate';
  if(ita>10) return 'Tan';
  if(ita>-30) return 'Brown';
  return 'Dark';
}

// ── Exposure correction ──────────────────────────────────────────────────────
function correctExposure(pixels){
  if(!pixels.length) return pixels;
  const lums = pixels.map(p=>0.299*p.r+0.587*p.g+0.114*p.b);
  const median = lums.sort((a,b)=>a-b)[Math.floor(lums.length/2)];
  const target = 185;
  if(median > target - 15) return pixels;
  const factor = Math.min(1.35, target/Math.max(80,median));
  return pixels.map(p=>({
    r: Math.min(255, Math.round(p.r*factor)),
    g: Math.min(255, Math.round(p.g*factor)),
    b: Math.min(255, Math.round(p.b*factor)),
  }));
}
function sampleRect(data, imgW, x, y, w, h){
  const out = [];
  for(let dy=0; dy<h; dy++){
    for(let dx=0; dx<w; dx++){
      const i = ((y+dy)*imgW+(x+dx))*4;
      const r=data[i], g=data[i+1], b=data[i+2];
      if(isSkin(r,g,b)) out.push({r,g,b});
    }
  }
  return out;
}
function processPixels(pixels, minPx=30){
  if(pixels.length<minPx) return null;
  const sorted=[...pixels].sort((a,b)=>
    (0.299*a.r+0.587*a.g+0.114*a.b)-(0.299*b.r+0.587*b.g+0.114*b.b));
  const lo=Math.floor(sorted.length*0.10);
  const hi=Math.ceil(sorted.length*0.95);
  const tr=sorted.slice(lo,hi);
  if(!tr.length) return null;
  return {
    r: Math.round(tr.reduce((s,p)=>s+p.r,0)/tr.length),
    g: Math.round(tr.reduce((s,p)=>s+p.g,0)/tr.length),
    b: Math.round(tr.reduce((s,p)=>s+p.b,0)/tr.length),
    n: tr.length,
  };
}

// ── Face bounding box (face-api OR fallback heuristic) ───────────────────────
async function detectFaceBox(canvas, ctx){
  const W=canvas.width, H=canvas.height;
  if(window.faceapi && window.__faceApiReady){
    try{
      const opts = new faceapi.TinyFaceDetectorOptions({inputSize:416, scoreThreshold:0.4});
      const det = await faceapi.detectSingleFace(canvas, opts);
      if(det && det.box){
        const b=det.box;
        return {x:Math.round(b.x), y:Math.round(b.y), w:Math.round(b.width), h:Math.round(b.height)};
      }
    }catch(e){ /* fall through */ }
  }
  // Skin-density grid fallback
  const cols=3, rows=4;
  const cw=Math.floor(W/cols), ch=Math.floor(H/rows);
  let bestScore=0, bestR=0, bestC=1;
  for(let row=0; row<rows; row++){
    for(let col=0; col<cols; col++){
      const d=ctx.getImageData(col*cw, row*ch, cw, ch).data;
      let cnt=0;
      for(let i=0; i<d.length; i+=4) if(isSkin(d[i],d[i+1],d[i+2])) cnt++;
      const ratio = cnt/(d.length/4);
      if(ratio>bestScore){ bestScore=ratio; bestR=row; bestC=col; }
    }
  }
  if(bestScore<0.22) return null;
  const cx=(bestC+0.5)*cw, cy=(bestR+0.5)*ch;
  const fw=Math.min(W*0.56, Math.max(W*0.30, cw*2.0));
  const fh=Math.min(H*0.70, Math.max(H*0.42, ch*2.5));
  return {
    x: Math.round(Math.max(0, cx-fw/2)),
    y: Math.round(Math.max(0, cy-fh/2)),
    w: Math.round(Math.min(W, fw)),
    h: Math.round(Math.min(H, fh)),
  };
}

// ── Multi-zone sampling ──────────────────────────────────────────────────────
function sampleFaceZones(data, imgW, imgH, faceBox){
  const {x,y,w,h} = faceBox;
  const zones = [
    {n:'forehead',   cx:0.50, cy:0.18, rw:0.38, rh:0.18, wt:0.20},
    {n:'leftCheek',  cx:0.24, cy:0.52, rw:0.28, rh:0.22, wt:0.30},
    {n:'rightCheek', cx:0.76, cy:0.52, rw:0.28, rh:0.22, wt:0.30},
    {n:'chin',       cx:0.50, cy:0.83, rw:0.28, rh:0.13, wt:0.20},
  ];
  return zones.map(z=>{
    const zx=Math.max(0, Math.round(x + w*z.cx - w*z.rw/2));
    const zy=Math.max(0, Math.round(y + h*z.cy - h*z.rh/2));
    const zw=Math.min(imgW-zx, Math.round(w*z.rw));
    const zh=Math.min(imgH-zy, Math.round(h*z.rh));
    if(zw<4 || zh<4) return {result:null, weight:z.wt, name:z.n};
    let pixels=sampleRect(data, imgW, zx, zy, zw, zh);
    pixels=correctExposure(pixels);
    return {result: processPixels(pixels, 20), weight: z.wt, name: z.n};
  });
}

// ── Frame capture ────────────────────────────────────────────────────────────
// Accepts either a HTMLVideoElement or a HTMLCanvasElement (pre-captured frame).
// For video sources we flip horizontally (the video is mirror-previewed).
// For canvas sources we assume the caller already baked in the correct
// orientation.
async function captureFrame(source){
  if(!source) return null;
  const isCanvas = source instanceof HTMLCanvasElement || source.tagName === 'CANVAS';
  const W = source.videoWidth || source.width || 0;
  const H = source.videoHeight || source.height || 0;
  if(!W || !H) return null;
  const canvas=document.createElement('canvas');
  canvas.width=W; canvas.height=H;
  const ctx=canvas.getContext('2d', {willReadFrequently:true});
  if(isCanvas){
    ctx.drawImage(source, 0, 0);
  } else {
    ctx.translate(W, 0); ctx.scale(-1, 1);
    ctx.drawImage(source, 0, 0);
    ctx.setTransform(1, 0, 0, 1, 0, 0);
  }
  const data=ctx.getImageData(0, 0, W, H).data;
  const faceBox=await detectFaceBox(canvas, ctx);
  if(!faceBox) return {faceFound:false, zones:[], canvas};
  return {
    faceFound:true,
    zones: sampleFaceZones(data, W, H, faceBox),
    canvas,
    faceBox,
  };
}

// ── Merge + match ────────────────────────────────────────────────────────────
function mergeCaptures(captures){
  const zoneW = {forehead:0.20, leftCheek:0.30, rightCheek:0.30, chin:0.20};
  let totalW=0, rA=0, gA=0, bA=0;
  captures.forEach(cap=>{
    if(!cap || !cap.faceFound) return;
    cap.zones.forEach(z=>{
      if(!z.result) return;
      const c = z.result.n * (zoneW[z.name] || z.weight);
      rA+=z.result.r*c; gA+=z.result.g*c; bA+=z.result.b*c;
      totalW+=c;
    });
  });
  if(totalW<1) return null;
  return {r:Math.round(rA/totalW), g:Math.round(gA/totalW), b:Math.round(bA/totalW)};
}

function findBestTone(rgb){
  const tones = window.LUMA_TONES;
  const lab = rgbToLab(rgb.r, rgb.g, rgb.b);
  const ita = Math.atan2(lab.L-50, lab.b)*(180/Math.PI);
  const group = ita>28 ? 'light' : ita>-10 ? 'medium' : 'deep';
  let best=tones[group][0], bestDE=Infinity;
  const searchIn = [group];
  // expand to neighbours if initial match is weak
  Object.keys(tones).forEach(k=>{
    if(!searchIn.includes(k)) searchIn.push(k);
  });
  searchIn.forEach(g=>{
    tones[g].forEach(tone=>{
      const tr=parseInt(tone.color.slice(1,3), 16);
      const tg=parseInt(tone.color.slice(3,5), 16);
      const tb=parseInt(tone.color.slice(5,7), 16);
      const de=deltaE(lab, rgbToLab(tr,tg,tb));
      if(de<bestDE){ bestDE=de; best=tone; }
    });
  });
  const confidence = Math.max(0, Math.min(100, Math.round(100 - bestDE*2.2)));
  return {tone:best, ita, confidence, deltaE:bestDE};
}

// ── Skin type from zone luminance ────────────────────────────────────────────
function classifySkinType(captures){
  const acc = {forehead:[], leftCheek:[], rightCheek:[], chin:[]};
  captures.forEach(cap=>{
    if(!cap || !cap.faceFound) return;
    cap.zones.forEach(z=>{
      if(!z.result) return;
      const lum=0.299*z.result.r + 0.587*z.result.g + 0.114*z.result.b;
      if(acc[z.name]) acc[z.name].push(lum);
    });
  });
  const mean = arr=>arr.length?arr.reduce((a,b)=>a+b,0)/arr.length:null;
  const fh=mean(acc.forehead), lc=mean(acc.leftCheek),
        rc=mean(acc.rightCheek), ch=mean(acc.chin);
  if(fh==null||lc==null||rc==null||ch==null) return {type:'Normal', sub:'Balanced'};
  const tZone=(fh+ch)/2, uZone=(lc+rc)/2;
  const diff=tZone-uZone;
  const overall=(fh+lc+rc+ch)/4;
  const variance=Math.sqrt([fh,lc,rc,ch].reduce((s,v)=>s+(v-overall)**2, 0)/4);
  if(diff>12 && variance>10) return {type:'Oily',        sub:'Shine in T-zone'};
  if(diff>7  && variance>5)  return {type:'Combination', sub:'Slight T-zone'};
  if(variance<4 && overall<145) return {type:'Dry',      sub:'Matte uniform finish'};
  return {type:'Normal', sub:'Balanced sebum'};
}

// ── Face shape from 68 landmarks ─────────────────────────────────────────────
function classifyFaceShape(landmarks){
  if(!landmarks) return null;
  const pts = landmarks.positions || landmarks;
  const d = (a,b)=>Math.hypot(a.x-b.x, a.y-b.y);
  const chin=pts[8], jawL=pts[0], jawR=pts[16];
  const jawLowL=pts[4], jawLowR=pts[12];
  const browOutL=pts[17], browOutR=pts[26];
  const browInL=pts[21], browInR=pts[22];
  const foreheadW=d(browOutL, browOutR);
  const cheekW=d(jawL, jawR);
  const jawW=d(jawLowL, jawLowR);
  const browMid={x:(browInL.x+browInR.x)/2, y:(browInL.y+browInR.y)/2};
  const faceH=d(browMid, chin)*1.20;
  const whr=cheekW/faceH, jcr=jawW/cheekW, fjr=foreheadW/jawW, fcr=foreheadW/cheekW;
  const chinW=d(pts[7], pts[9]);
  const chinPointy=chinW/jawW;
  if(whr>0.88 && jcr>0.92) return {shape:'Square', sub:'Strong jaw'};
  if(whr>0.92 && jcr>0.80 && chinPointy>0.30) return {shape:'Round', sub:'Soft curves'};
  if(fjr>1.10 && jcr<0.85) return {shape:'Heart', sub:'Wider forehead'};
  if(fcr<0.88 && jcr<0.88) return {shape:'Diamond', sub:'Cheekbones widest'};
  if(whr<0.75) return {shape:'Oblong', sub:'Longer than wide'};
  return {shape:'Oval', sub:'Balanced proportions'};
}

// ── face-api.js loader ───────────────────────────────────────────────────────
const FACEAPI_LIB = 'https://cdn.jsdelivr.net/npm/@vladmandic/face-api@1.7.14/dist/face-api.js';
const FACEAPI_MODELS = 'https://cdn.jsdelivr.net/npm/@vladmandic/face-api@1.7.14/model/';
window.__faceApiReady = false;
let __faceApiPromise = null;
function loadScriptOnce(src){
  return new Promise((resolve, reject)=>{
    const s=document.createElement('script');
    s.src=src; s.async=true;
    s.onload=resolve; s.onerror=()=>reject(new Error('failed to load '+src));
    document.head.appendChild(s);
  });
}
async function ensureFaceApi(){
  if(window.__faceApiReady) return true;
  if(__faceApiPromise) return __faceApiPromise;
  __faceApiPromise = (async()=>{
    try{
      if(!window.faceapi) await loadScriptOnce(FACEAPI_LIB);
      await Promise.all([
        faceapi.nets.tinyFaceDetector.loadFromUri(FACEAPI_MODELS),
        faceapi.nets.faceLandmark68Net.loadFromUri(FACEAPI_MODELS),
        faceapi.nets.faceExpressionNet.loadFromUri(FACEAPI_MODELS),
        faceapi.nets.ageGenderNet.loadFromUri(FACEAPI_MODELS),
      ]);
      window.__faceApiReady = true;
      return true;
    }catch(e){
      console.warn('[luma] face-api load failed:', e);
      return false;
    }
  })();
  return __faceApiPromise;
}
async function analyzeFaceWithApi(input){
  if(!window.__faceApiReady || !window.faceapi || !input) return null;
  // Try a few detector profiles — start strict, then loosen — so a slight
  // head tilt or softer-lit frame still lands a valid detection.
  const profiles = [
    {inputSize:416, scoreThreshold:0.5},
    {inputSize:512, scoreThreshold:0.3},
    {inputSize:640, scoreThreshold:0.2},
  ];
  for(const p of profiles){
    try{
      const opts = new faceapi.TinyFaceDetectorOptions(p);
      const det = await faceapi.detectSingleFace(input, opts)
        .withFaceLandmarks().withFaceExpressions().withAgeAndGender();
      if(det){
        const shape = classifyFaceShape(det.landmarks);
        const exprEntries = Object.entries(det.expressions||{}).sort((a,b)=>b[1]-a[1]);
        const topExpr = exprEntries[0] ? exprEntries[0][0] : 'neutral';
        return {
          ...(shape||{}),
          age: Math.round(det.age),
          gender: det.gender,
          expression: topExpr,
        };
      }
    }catch(e){ /* try next profile */ }
  }
  return null;
}

// ── MediaPipe Face Landmarker (478-landmark, blendshapes, pose matrix) ──────
// Loaded lazily via dynamic ESM import so the rest of the app stays on the
// classic script pipeline. All inference happens locally (WASM + GPU delegate).
//
// Resilience: we try multiple CDNs in order. Whichever loads the JS is also
// used for the WASM files, so the SIMD/threaded binaries stay on the same
// origin as the ESM bundle (avoids mid-init CORS weirdness).
// Note: `0.10.22` is NOT a published stable release on npm (only a pre-release
// tag exists). The last real stable before it is `0.10.21`.
const MP_VERSION   = '0.10.21';
const MP_SOURCES   = [
  { esm: `https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@${MP_VERSION}/vision_bundle.mjs`,
    wasm:`https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@${MP_VERSION}/wasm` },
  { esm: `https://unpkg.com/@mediapipe/tasks-vision@${MP_VERSION}/vision_bundle.mjs`,
    wasm:`https://unpkg.com/@mediapipe/tasks-vision@${MP_VERSION}/wasm` },
  { esm: `https://esm.sh/@mediapipe/tasks-vision@${MP_VERSION}/vision_bundle.mjs`,
    wasm:`https://esm.sh/@mediapipe/tasks-vision@${MP_VERSION}/wasm` },
];
const MP_MODEL_URL = 'https://storage.googleapis.com/mediapipe-models/face_landmarker/face_landmarker/float16/1/face_landmarker.task';
let __mpFaceLandmarker = null;
let __mpFaceLandmarkerPromise = null;

async function loadMpVisionWithFallback(){
  let lastErr = null;
  for (const src of MP_SOURCES) {
    try {
      const vision = await import(/* @vite-ignore */ src.esm);
      if (vision && vision.FilesetResolver && vision.FaceLandmarker) {
        return { vision, wasmBase: src.wasm, cdn: src.esm };
      }
      lastErr = new Error('Module loaded but FaceLandmarker missing from ' + src.esm);
    } catch (e) {
      console.warn('[luma] MediaPipe CDN failed, trying next:', src.esm, e && e.message);
      lastErr = e;
    }
  }
  throw new Error(
    'Could not load MediaPipe Face Landmarker. Every CDN failed — check your ' +
    'internet connection / ad-blocker / browser extensions. Last error: ' +
    (lastErr && (lastErr.message || lastErr.toString()))
  );
}

async function ensureFaceLandmarker(){
  if (__mpFaceLandmarker) return __mpFaceLandmarker;
  if (__mpFaceLandmarkerPromise) return __mpFaceLandmarkerPromise;
  __mpFaceLandmarkerPromise = (async () => {
    const { vision, wasmBase } = await loadMpVisionWithFallback();
    const { FilesetResolver, FaceLandmarker } = vision;
    const resolver = await FilesetResolver.forVisionTasks(wasmBase);
    let landmarker;
    try {
      landmarker = await FaceLandmarker.createFromOptions(resolver, {
        baseOptions: { modelAssetPath: MP_MODEL_URL, delegate: 'GPU' },
        outputFaceBlendshapes: true,
        outputFacialTransformationMatrixes: true,
        runningMode: 'VIDEO',
        numFaces: 1,
      });
    } catch (e) {
      // GPU delegate can fail on some devices; retry on CPU so we still work.
      console.warn('[luma] MediaPipe GPU delegate failed, falling back to CPU:', e);
      landmarker = await FaceLandmarker.createFromOptions(resolver, {
        baseOptions: { modelAssetPath: MP_MODEL_URL, delegate: 'CPU' },
        outputFaceBlendshapes: true,
        outputFacialTransformationMatrixes: true,
        runningMode: 'VIDEO',
        numFaces: 1,
      });
    }
    __mpFaceLandmarker = landmarker;
    return landmarker;
  })().catch(err => {
    // Reset the promise so a future attempt can retry all CDNs cleanly.
    __mpFaceLandmarkerPromise = null;
    throw err;
  });
  return __mpFaceLandmarkerPromise;
}

// Expose on window for ScanModal to reuse
window.__luma = {
  captureFrame, mergeCaptures, findBestTone, itaLabel,
  classifySkinType, classifyFaceShape, analyzeFaceWithApi, ensureFaceApi,
  ensureFaceLandmarker,
};

// Kick off preload
ensureFaceApi();
// Preload MediaPipe too (models cache in browser so subsequent scans start instantly)
ensureFaceLandmarker().catch(e => console.warn('[luma] FaceLandmarker preload failed:', e));

// ────────────────────────────────────────────────────────────────────────────
// Biometric Scanner COMPONENT — MediaPipe Face Landmarker (478 landmarks)
//   • Active liveness challenge (direction-agnostic head yaw + blink)
//   • Dynamic SVG safety-zone (70% coverage + centered gate)
//   • Auto-capture on quality (yaw~0 + brightness + Laplacian variance)
//   • 100% local processing — no pixels leave the device until capture passes
// ────────────────────────────────────────────────────────────────────────────

// Convert MediaPipe 4x4 facial transformation matrix (column-major) to
// Tait-Bryan Euler angles (yaw around Y, pitch around X, roll around Z).
function matrixToEuler(m) {
  if (!m || m.length < 16) return { yaw: 0, pitch: 0, roll: 0 };
  // Column-major indices for the top-left 3x3 rotation submatrix.
  const m00 = m[0],  m10 = m[1],  m20 = m[2];
  const m01 = m[4],  m11 = m[5],  m21 = m[6];
  const m02 = m[8],  m12 = m[9],  m22 = m[10];
  // Tait-Bryan YXZ order — robust for near-frontal faces.
  const pitch = Math.asin(Math.max(-1, Math.min(1, -m12)));
  const yaw   = Math.atan2(m02, m22);
  const roll  = Math.atan2(m10, m11);
  return { yaw, pitch, roll };
}

// Per-frame brightness + Laplacian-variance sharpness over a face ROI.
function measureFrameQuality(video, minX, minY, maxX, maxY) {
  const vw = video.videoWidth || 0, vh = video.videoHeight || 0;
  if (!vw || !vh) return { brightness: 0, sharpness: 0, sideDelta: 0, sideLit: false, effectiveBrightness: 0 };
  const x = Math.max(0, Math.floor(minX * vw));
  const y = Math.max(0, Math.floor(minY * vh));
  const w = Math.min(vw - x, Math.max(1, Math.floor((maxX - minX) * vw)));
  const h = Math.min(vh - y, Math.max(1, Math.floor((maxY - minY) * vh)));
  if (w < 20 || h < 20) return { brightness: 0, sharpness: 0, sideDelta: 0, sideLit: false, effectiveBrightness: 0 };

  const TW = 64, TH = 64;
  const c = document.createElement('canvas');
  c.width = TW; c.height = TH;
  const ctx = c.getContext('2d', { willReadFrequently: true });
  try { ctx.drawImage(video, x, y, w, h, 0, 0, TW, TH); }
  catch (_) { return { brightness: 0, sharpness: 0, sideDelta: 0, sideLit: false, effectiveBrightness: 0 }; }
  const data = ctx.getImageData(0, 0, TW, TH).data;

  // Per-pixel luma + left/right half accumulators.
  // We split at TW/2 to detect single-sided lighting (window / lamp / phone torch).
  const luma = new Float32Array(TW * TH);
  let lumaSum = 0;
  let leftSum = 0, leftN = 0, rightSum = 0, rightN = 0;
  const HALF = TW >> 1;
  for (let yy = 0; yy < TH; yy++) {
    for (let xx = 0; xx < TW; xx++) {
      const i = (yy * TW + xx) * 4;
      const L = 0.299 * data[i] + 0.587 * data[i + 1] + 0.114 * data[i + 2];
      const j = yy * TW + xx;
      luma[j] = L; lumaSum += L;
      if (xx < HALF) { leftSum += L;  leftN++;  }
      else           { rightSum += L; rightN++; }
    }
  }
  const brightness = lumaSum / (TW * TH);
  const leftMean  = leftSum  / Math.max(1, leftN);
  const rightMean = rightSum / Math.max(1, rightN);
  const sideDelta = Math.abs(leftMean - rightMean);
  const brightSideMean = Math.max(leftMean, rightMean);
  const dimSideMean    = Math.min(leftMean, rightMean);
  const sideLit   = sideDelta >= 20;        // ~8% luma delta = noticeable cross-face bias

  // Under side lighting we weight the brighter half heavily as "effective
  // brightness", so a well-lit cheek doesn't get rejected just because the
  // other side is in shadow. Stronger asymmetry ⇒ trust the bright side more.
  const sideWeight = Math.min(1, sideDelta / 60);   // 0..1 ramp
  const effectiveBrightness = sideLit
    ? ((0.55 + 0.35 * sideWeight) * brightSideMean +
       (0.45 - 0.35 * sideWeight) * brightness)
    : brightness;

  // Laplacian 3x3 → std-dev of response.
  // When side-lit, compute sharpness over the BRIGHT half only: the dark side
  // carries almost no gradient, which would otherwise tank the variance.
  const xStart = sideLit ? (leftMean > rightMean ? 1 : HALF)      : 1;
  const xEnd   = sideLit ? (leftMean > rightMean ? HALF : TW - 1) : TW - 1;
  let lSum = 0, lCount = 0;
  const lap = new Float32Array(TW * TH);
  for (let yy = 1; yy < TH - 1; yy++) {
    for (let xx = xStart; xx < xEnd; xx++) {
      const i = yy * TW + xx;
      const v = -4 * luma[i] + luma[i - 1] + luma[i + 1] + luma[i - TW] + luma[i + TW];
      lap[i] = v; lSum += v; lCount++;
    }
  }
  lCount = Math.max(1, lCount);
  const mean = lSum / lCount;
  let variance = 0;
  for (let yy = 1; yy < TH - 1; yy++) {
    for (let xx = xStart; xx < xEnd; xx++) {
      const i = yy * TW + xx;
      const d = lap[i] - mean;
      variance += d * d;
    }
  }
  variance /= lCount;

  return {
    brightness: Math.round(brightness),
    effectiveBrightness: Math.round(effectiveBrightness),
    sharpness: Math.round(Math.sqrt(variance) * 10) / 10,
    sideDelta: Math.round(sideDelta),
    sideLit,
  };
}

// Small tesselation-ish adjacency used to render the mesh without drawing all
// 10k+ edges. We draw every landmark as a dot and connect nearest neighbors
// along a few hand-picked contour polylines (silhouette, eyes, lips, brows).
const MESH_RINGS = [
  // Face silhouette (subset of FaceMesh FACE_OVAL)
  [10,338,297,332,284,251,389,356,454,323,361,288,397,365,379,378,400,377,152,148,176,149,150,136,172,58,132,93,234,127,162,21,54,103,67,109,10],
  // Right eye
  [33,7,163,144,145,153,154,155,133,173,157,158,159,160,161,246,33],
  // Left eye
  [263,249,390,373,374,380,381,382,362,398,384,385,386,387,388,466,263],
  // Right brow
  [70,63,105,66,107],
  // Left brow
  [336,296,334,293,300],
  // Outer lips
  [61,146,91,181,84,17,314,405,321,375,291,409,270,269,267,0,37,39,40,185,61],
];

function Scanner({ scanState, onScan, tone, results }) {
  const scanned = scanState === 'done' && results;
  const videoRef = useRef(null);
  const overlayRef = useRef(null);
  const streamRef = useRef(null);
  const rafRef = useRef(0);
  const landmarkerRef = useRef(null);
  const lastDetectTsRef = useRef(-1);
  const stateRef = useRef(null);

  // UI state
  const [phase, setPhase] = useState('idle');
  // 'idle' | 'loading' | 'positioning' | 'challenge-1' | 'challenge-2' | 'blink' | 'locking' | 'captured'
  const [challenges, setChallenges] = useState({ first: false, second: false, blink: false });
  const [hud, setHud] = useState({
    centered: false, coverage: 0, yawDeg: 0, pitchDeg: 0,
    brightness: 0, sharpness: 0, blinkL: 0, blinkR: 0, faceSeen: false,
    sideLit: false, sideDelta: 0, effectiveBrightness: 0,
  });
  const [errMsg, setErrMsg] = useState(null);

  const YAW_LIVENESS = 0.32;   // ~18° — liveness challenge threshold
  const YAW_LOCK_DEG = 8;       // face-forward gate (degrees) — laptop webcams above screen push this
  const PITCH_LOCK_DEG = 16;    // head-level gate (degrees) — laptop webcams above screen push this
  const MIN_BRIGHTNESS = 90;    // avg luma floor (0..255)
  const MAX_BRIGHTNESS = 225;   // avoid blown highlights
  const MIN_SHARPNESS = 6;      // Laplacian std-dev floor
  const COVERAGE_GATE = 0.70;   // "70% of the oval"

  // ── cleanup ────────────────────────────────────────────────────────────────
  const stopAll = useCallback(() => {
    if (rafRef.current) cancelAnimationFrame(rafRef.current);
    rafRef.current = 0;
    if (streamRef.current) {
      try { streamRef.current.getTracks().forEach(t => t.stop()); } catch (_) {}
      streamRef.current = null;
    }
    if (videoRef.current) {
      try { videoRef.current.srcObject = null; } catch (_) {}
    }
    // We don't close the landmarker — it's a singleton reused across scans.
    landmarkerRef.current = null;
  }, []);

  useEffect(() => () => stopAll(), [stopAll]);

  // Reset on external finish
  useEffect(() => {
    if (scanState === 'done') {
      stopAll();
      setPhase('idle');
      setChallenges({ first: false, second: false, blink: false });
      // Release pre-captured frames so the next scan doesn't reuse stale data.
      const L = window.__luma;
      if (L) {
        L.preCapturedCanvases = null;
        L.preCapturedCanvas = null;
        L.preCapturedFaceBox = null;
      }
    }
  }, [scanState, stopAll]);

  // ── draw overlay ───────────────────────────────────────────────────────────
  const drawOverlay = (landmarks) => {
    const canvas = overlayRef.current;
    if (!canvas) return;
    const rect = canvas.getBoundingClientRect();
    const cssW = Math.max(1, Math.floor(rect.width));
    const cssH = Math.max(1, Math.floor(rect.height));
    const dpr = window.devicePixelRatio || 1;
    if (canvas.width !== cssW * dpr || canvas.height !== cssH * dpr) {
      canvas.width = cssW * dpr;
      canvas.height = cssH * dpr;
    }
    const ctx = canvas.getContext('2d');
    ctx.setTransform(1, 0, 0, 1, 0, 0);
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    if (!landmarks) return;
    ctx.scale(dpr, dpr);
    const W = cssW, H = cssH;

    // Dots — render every landmark (subsample every 2nd for perf).
    ctx.fillStyle = 'rgba(255, 201, 168, 0.55)';
    for (let i = 0; i < landmarks.length; i += 1) {
      const p = landmarks[i];
      ctx.fillRect(p.x * W - 0.5, p.y * H - 0.5, 1, 1);
    }
    // Contour polylines
    ctx.strokeStyle = 'rgba(255, 201, 168, 0.65)';
    ctx.lineWidth = 0.8;
    for (const ring of MESH_RINGS) {
      ctx.beginPath();
      for (let i = 0; i < ring.length; i++) {
        const p = landmarks[ring[i]];
        if (!p) continue;
        const x = p.x * W, y = p.y * H;
        if (i === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
      }
      ctx.stroke();
    }
  };

  // ── per-frame loop ─────────────────────────────────────────────────────────
  const loop = useCallback(() => {
    const v = videoRef.current;
    const landmarker = landmarkerRef.current;
    const s = stateRef.current;
    if (!v || !landmarker || !s) return;
    if (!v.videoWidth) { rafRef.current = requestAnimationFrame(loop); return; }

    let result = null;
    try {
      const ts = performance.now();
      // MediaPipe requires monotonically increasing timestamps in VIDEO mode.
      if (ts <= lastDetectTsRef.current) { rafRef.current = requestAnimationFrame(loop); return; }
      lastDetectTsRef.current = ts;
      result = landmarker.detectForVideo(v, ts);
    } catch (e) { /* occasional frame errors — just skip */ }

    const landmarks = result && result.faceLandmarks && result.faceLandmarks[0];
    drawOverlay(landmarks);

    if (!landmarks) {
      setHud(h => ({ ...h, faceSeen: false }));
      rafRef.current = requestAnimationFrame(loop);
      return;
    }

    // Face bbox in normalized coords.
    let minX = 1, minY = 1, maxX = 0, maxY = 0;
    for (let i = 0; i < landmarks.length; i++) {
      const p = landmarks[i];
      if (p.x < minX) minX = p.x;
      if (p.x > maxX) maxX = p.x;
      if (p.y < minY) minY = p.y;
      if (p.y > maxY) maxY = p.y;
    }
    const faceCx = (minX + maxX) / 2;
    const faceCy = (minY + maxY) / 2;
    const faceW = maxX - minX;
    const faceH = maxY - minY;

    // Safety zone: centered ellipse rx=0.28, ry=0.36 in viewport-normalized coords
    const OVAL_RX = 0.28, OVAL_RY = 0.36;
    const dx = (faceCx - 0.5) / OVAL_RX;
    const dy = (faceCy - 0.5) / OVAL_RY;
    const insideOval = (dx * dx + dy * dy) < 1.0;
    const centered = insideOval
      && Math.abs(faceCx - 0.5) < 0.13
      && Math.abs(faceCy - 0.5) < 0.13;
    // "70% of the oval" = face bounding box ~70% of the oval's bounding box
    const coverage = Math.min(1,
      Math.max(faceW / (2 * OVAL_RX), faceH / (2 * OVAL_RY)));

    // Euler angles
    const mxEntry = result.facialTransformationMatrixes && result.facialTransformationMatrixes[0];
    const mx = mxEntry ? mxEntry.data : null;
    const { yaw, pitch, roll } = matrixToEuler(mx);
    const yawDeg = yaw * 180 / Math.PI;
    const pitchDeg = pitch * 180 / Math.PI;

    // Blendshapes (blink)
    const bs = (result.faceBlendshapes && result.faceBlendshapes[0] && result.faceBlendshapes[0].categories) || [];
    let blinkL = 0, blinkR = 0;
    for (let i = 0; i < bs.length; i++) {
      const c = bs[i];
      if (c.categoryName === 'eyeBlinkLeft') blinkL = c.score;
      else if (c.categoryName === 'eyeBlinkRight') blinkR = c.score;
    }
    const eyesClosed = blinkL > 0.55 && blinkR > 0.55;
    const eyesOpen   = blinkL < 0.20 && blinkR < 0.20;

    // Quality from ROI
    const q = measureFrameQuality(v, minX, minY, maxX, maxY);

    const now = performance.now();
    // Throttle HUD updates to ~10Hz — state machine still runs at full rate
    // via stateRef, keeping the feel responsive without React churn.
    if (!s.lastHudAt || now - s.lastHudAt > 90) {
      s.lastHudAt = now;
      setHud({
        centered, coverage: Math.round(coverage * 100),
        yawDeg, pitchDeg,
        brightness: q.brightness, sharpness: q.sharpness,
        sideLit: !!q.sideLit, sideDelta: q.sideDelta || 0,
        effectiveBrightness: q.effectiveBrightness || q.brightness,
        blinkL, blinkR, faceSeen: true,
      });
    }

    // ── state machine ────────────────────────────────────────────────────────
    if (s.phase === 'positioning') {
      if (centered && coverage >= COVERAGE_GATE) {
        s.holdStart = s.holdStart || now;
        if (now - s.holdStart > 600) {
          s.phase = 'challenge-1';
          s.challengeStart = now;
          s.firstYawSign = 0;
          setPhase('challenge-1');
        }
      } else {
        s.holdStart = 0;
      }
    } else if (s.phase === 'challenge-1') {
      // Direction-agnostic: accept the first significant turn, remember its sign
      if (Math.abs(yaw) > YAW_LIVENESS) {
        s.firstYawSign = Math.sign(yaw);
        s.challenges.first = true;
        s.phase = 'challenge-2';
        s.challengeStart = now;
        setChallenges({ ...s.challenges });
        setPhase('challenge-2');
      } else if (now - s.challengeStart > 12000) {
        return bail('Turn-head challenge timed out — try again.');
      }
    } else if (s.phase === 'challenge-2') {
      // Must be opposite sign from first
      const needSign = -s.firstYawSign;
      if (Math.sign(yaw) === needSign && Math.abs(yaw) > YAW_LIVENESS) {
        s.challenges.second = true;
        s.phase = 'blink';
        s.challengeStart = now;
        s.blinkStage = 'open';
        setChallenges({ ...s.challenges });
        setPhase('blink');
      } else if (now - s.challengeStart > 12000) {
        return bail('Second head-turn timed out — try again.');
      }
    } else if (s.phase === 'blink') {
      // Require an open → closed → open transition
      if (s.blinkStage === 'open' && eyesClosed) s.blinkStage = 'closed';
      else if (s.blinkStage === 'closed' && eyesOpen) {
        s.challenges.blink = true;
        s.phase = 'locking';
        s.lockStart = now;
        s.failCounts = { yaw:0, pitch:0, centered:0, coverage:0, bright:0, sharp:0 };
        setChallenges({ ...s.challenges });
        setPhase('locking');
      } else if (now - s.challengeStart > 10000) {
        return bail('Blink not detected — try again.');
      }
    } else if (s.phase === 'locking') {
      const yawOK  = Math.abs(yawDeg)  < YAW_LOCK_DEG;
      const pitchOK = Math.abs(pitchDeg) < PITCH_LOCK_DEG;
      // Auto-adapt for side-lit scenes: measure the bright half only for
      // brightness, relax both the brightness window AND the sharpness floor
      // since one half has no visible texture and can be dark or blown out.
      // These still reject truly unusable frames.
      const brightProbe = q.sideLit ? q.effectiveBrightness : q.brightness;
      const brightMin   = q.sideLit ? 70  : MIN_BRIGHTNESS;   // 90 → 70
      const brightMax   = q.sideLit ? 245 : MAX_BRIGHTNESS;   // 225 → 245
      const sharpFloor  = q.sideLit ? 2.5 : MIN_SHARPNESS;    // 6 → 2.5
      const brightOK = brightProbe >= brightMin && brightProbe <= brightMax;
      const sharpOK  = q.sharpness  >= sharpFloor;
      const poseOK = yawOK && pitchOK && centered && coverage >= 0.62;
      const qualityOK = poseOK && brightOK && sharpOK;

      // Track which gate failed most often so the bail message can be useful.
      s.failCounts = s.failCounts || { yaw:0, pitch:0, centered:0, coverage:0, bright:0, sharp:0 };
      if (!qualityOK) {
        if (!yawOK)       s.failCounts.yaw++;
        if (!pitchOK)     s.failCounts.pitch++;
        if (!centered)    s.failCounts.centered++;
        if (coverage < 0.62) s.failCounts.coverage++;
        if (!brightOK)    s.failCounts.bright++;
        if (!sharpOK)     s.failCounts.sharp++;
      }

      if (qualityOK) {
        // Snapshot current frame, score it, remember top-3
        const c = document.createElement('canvas');
        c.width = v.videoWidth; c.height = v.videoHeight;
        const ctx = c.getContext('2d', { willReadFrequently: true });
        try { ctx.drawImage(v, 0, 0); } catch (_) {}
        const score =
          q.sharpness * 10
          + (1 - Math.abs(yawDeg) / YAW_LOCK_DEG) * 40
          + (1 - Math.min(1, Math.abs(q.brightness - 160) / 80)) * 30
          + coverage * 20;
        s.best.push({
          canvas: c, score, brightness: q.brightness, sharpness: q.sharpness,
          yawDeg, pitchDeg, coverage, faceBox: { minX, minY, maxX, maxY },
        });
        s.best.sort((a, b) => b.score - a.score);
        if (s.best.length > 4) s.best.length = 4;
      }

      if (now - s.lockStart > 1400 && s.best.length > 0) {
        s.phase = 'captured';
        setPhase('captured');
        finalize(s.best);
        return;
      }
      if (now - s.lockStart > 10000) {
        // Name the single biggest offender so the user knows what to fix.
        const fc = s.failCounts || {};
        const reasons = {
          pitch:    'tilt your head less (look straight at camera)',
          yaw:      'face the camera more squarely',
          centered: 'center your face in the oval',
          coverage: 'move closer to the camera',
          bright:   'improve lighting',
          sharp:    'hold still / clean the lens',
        };
        let worst = null, worstN = 0;
        for (const k in fc) { if (fc[k] > worstN) { worstN = fc[k]; worst = k; } }
        const hint = worst && reasons[worst] ? ` — ${reasons[worst]}` : '';
        return bail('Could not get a clear frame' + hint + '.');
      }
    }

    rafRef.current = requestAnimationFrame(loop);

    function bail(msg) {
      console.warn('[luma-bio]', msg);
      setErrMsg(msg);
      stopAll();
      setPhase('idle');
    }
  }, [stopAll]);

  // ── finalize → hand off to analysis modal ──────────────────────────────────
  const finalize = (bestFrames) => {
    const top = bestFrames[0];
    const L = window.__luma;
    L.preCapturedCanvases = bestFrames.map(f => f.canvas);
    L.preCapturedCanvas = top.canvas;
    L.preCapturedFaceBox = top.faceBox;
    L.liveness = {
      challenges: { ...stateRef.current.challenges },
      yawDeg: top.yawDeg,
      pitchDeg: top.pitchDeg,
      brightness: top.brightness,
      sharpness: top.sharpness,
      coverage: top.coverage,
    };
    // Tear down the camera immediately — we have what we need.
    stopAll();
    // Kick analysis (uses existing pipeline via ScanModal)
    setTimeout(() => { onScan && onScan(); }, 400);
  };

  // ── begin → request camera + model, then start loop ────────────────────────
  const begin = async () => {
    if (phase !== 'idle') return;
    setErrMsg(null);
    setPhase('loading');
    setChallenges({ first: false, second: false, blink: false });

    try {
      const L = window.__luma;
      const [stream, landmarker] = await Promise.all([
        navigator.mediaDevices.getUserMedia({
          video: { facingMode: 'user', width: { ideal: 1280 }, height: { ideal: 960 }, frameRate: { ideal: 30 } },
          audio: false,
        }),
        L.ensureFaceLandmarker(),
      ]);
      streamRef.current = stream;
      landmarkerRef.current = landmarker;
      window.__luma.videoStream = stream;

      // Wait for <video> to mount
      let tries = 0;
      while (!videoRef.current && tries < 40) {
        await new Promise(r => setTimeout(r, 50));
        tries++;
      }
      if (!videoRef.current) throw new Error('Video element missing');
      videoRef.current.srcObject = stream;
      try { await videoRef.current.play(); } catch (_) {}
      await new Promise(resolve => {
        const v = videoRef.current;
        if (!v || v.videoWidth > 0) return resolve();
        const ok = () => { v.removeEventListener('loadedmetadata', ok); resolve(); };
        v.addEventListener('loadedmetadata', ok, { once: true });
        setTimeout(resolve, 2500);
      });
      window.__luma.videoEl = videoRef.current;

      stateRef.current = {
        phase: 'positioning',
        challenges: { first: false, second: false, blink: false },
        firstYawSign: 0,
        challengeStart: 0,
        lockStart: 0,
        holdStart: 0,
        blinkStage: 'open',
        best: [],
      };
      setPhase('positioning');
      lastDetectTsRef.current = -1;
      rafRef.current = requestAnimationFrame(loop);
    } catch (e) {
      console.warn('[luma-bio] begin failed:', e);
      stopAll();
      setErrMsg(
        e.name === 'NotAllowedError' ? 'Camera access denied — enable it in your browser.' :
        e.name === 'NotFoundError'   ? 'No front-facing camera found on this device.' :
        'Could not start scan: ' + (e.message || e.name || 'unknown error')
      );
      setPhase('idle');
    }
  };

  // ── derived UI values ──────────────────────────────────────────────────────
  const chipData = scanned ? {
    faceShape: results.faceShape || 'Detected',
    faceShapeSub: results.faceShapeSub || 'Landmarks detected',
    tone: results.tone ? results.tone.name : tone.name,
    toneSub: results.tone ? 'ITA° '+results.ita.toFixed(1)+' · '+itaLabel(results.ita) : tone.undertone,
    undertone: (results.tone ? results.tone.undertone : tone.undertone).split(' · ')[0],
    undertoneSub: results.tone ? results.tone.undertone : 'High confidence',
    skinType: results.skinType || 'Normal',
    skinTypeSub: (results.skinTypeSub || '') + ' · '+(results.confidence||0)+'%',
  } : null;

  // Safety-zone ring feedback + coverage progress
  const showOverlay = phase !== 'idle' && phase !== 'captured';
  const ringClass =
    (phase === 'captured') ? 'ok' :
    (phase === 'positioning' && hud.faceSeen && hud.centered && hud.coverage >= 70) ? 'ok' :
    (phase === 'locking') ? 'ok' :
    (phase === 'positioning' && !hud.faceSeen) ? 'warn' : '';
  // Ring perimeter for the safety oval (rx=28, ry=36 in viewBox 100x100)
  const OVAL_CIRC = 203; // Ramanujan approx 2π * sqrt((rx²+ry²)/2)
  const coverageOffset = OVAL_CIRC * (1 - Math.min(1, hud.coverage / 100));

  const posStatus =
    !hud.faceSeen ? 'No face detected — centre yourself in the oval.' :
    !hud.centered ? 'Move closer to the centre of the oval.' :
    hud.coverage < 70 ? `Move closer — ${hud.coverage}% coverage (need 70%)` :
    hud.sideLit    ? 'Strong side lighting detected — adapting…' :
    'Hold still…';

  const promptTxt =
    phase === 'loading'     ? 'Loading biometric models…' :
    phase === 'positioning' ? posStatus :
    phase === 'challenge-1' ? 'Slowly turn your head to one side' :
    phase === 'challenge-2' ? 'Now turn to the other side' :
    phase === 'blink'       ? 'Blink to confirm liveness' :
    phase === 'locking'     ? 'Hold still — capturing best frame' :
    phase === 'captured'    ? 'Biometric capture complete' :
    '';

  const promptArrow =
    phase === 'challenge-2' && stateRef.current
      ? (stateRef.current.firstYawSign > 0 ? '→' : '←')
      : phase === 'challenge-1' ? '↔'
      : phase === 'blink' ? '◉'
      : null;

  // Under strong one-sided lighting we grade off the bright half, not the mean —
  // this matches the actual capture gate so the HUD doesn't show a false red.
  const brightProbe = hud.sideLit && hud.effectiveBrightness
    ? hud.effectiveBrightness
    : hud.brightness;
  const brightMinUI  = hud.sideLit ? 70  : MIN_BRIGHTNESS;
  const brightMaxUI  = hud.sideLit ? 245 : MAX_BRIGHTNESS;
  const sharpFloorUI = hud.sideLit ? 2.5 : MIN_SHARPNESS;
  const metricOK = {
    yaw:   Math.abs(hud.yawDeg) < YAW_LOCK_DEG,
    bright: brightProbe >= brightMinUI && brightProbe <= brightMaxUI,
    sharp:  hud.sharpness  >= sharpFloorUI,
    cover:  hud.coverage   >= 70,
  };

  return (
    <div className="scan-area">
      <div className="section-eyebrow">
        <span className="status-dot"/>
        {phase === 'idle' ? 'Biometric Scanner' :
         phase === 'captured' ? 'Capture Locked · Analysing' :
         'Live Biometric Capture'}
      </div>

      <div className="scan-viewport">
        <div className="scan-dots"/>
        <video
          ref={videoRef}
          autoPlay playsInline muted
          style={{
            position:'absolute', inset:0, width:'100%', height:'100%',
            objectFit:'cover', transform:'scaleX(-1)', borderRadius:'inherit',
            display: (phase === 'idle' || phase === 'loading') ? 'none' : 'block',
          }}/>

        {/* Placeholder illustration only when idle */}
        {phase === 'idle' && (
          <svg className="face-svg" viewBox="0 0 200 280" fill="none">
            <defs>
              <radialGradient id="sg" cx="50%" cy="40%" r="60%">
                <stop offset="0%" stopColor="#f0d5bc"/>
                <stop offset="100%" stopColor="#d4a87a"/>
              </radialGradient>
            </defs>
            <ellipse cx="100" cy="120" rx="72" ry="88" fill="url(#sg)"/>
            <path d="M28 110 Q30 50 100 35 Q170 50 172 110 Q160 55 100 42 Q40 55 28 110Z" fill="#1a1010"/>
            <ellipse cx="69" cy="106" rx="11" ry="7" fill="white"/>
            <ellipse cx="69" cy="107" rx="5" ry="5" fill="#3a1e10"/>
            <ellipse cx="131" cy="106" rx="11" ry="7" fill="white"/>
            <ellipse cx="131" cy="107" rx="5" ry="5" fill="#3a1e10"/>
            <path d="M55 92 Q72 85 84 88" stroke="#2a1810" strokeWidth="2.5" fill="none" strokeLinecap="round"/>
            <path d="M116 88 Q128 85 145 92" stroke="#2a1810" strokeWidth="2.5" fill="none" strokeLinecap="round"/>
            <path d="M82 170 Q100 164 118 170 Q110 178 100 180 Q90 178 82 170Z" fill="#c06a58"/>
            <ellipse cx="55" cy="145" rx="16" ry="10" fill="#e09070" opacity="0.25"/>
            <ellipse cx="145" cy="145" rx="16" ry="10" fill="#e09070" opacity="0.25"/>
          </svg>
        )}

        {/* Live 478-point mesh overlay (mirrored) */}
        {showOverlay && <canvas ref={overlayRef} className="bio-mesh"/>}

        {/* SVG safety zone */}
        {showOverlay && (
          <svg className="bio-guide" viewBox="0 0 100 100" preserveAspectRatio="none">
            <ellipse className="ring-bg" cx="50" cy="50" rx="28" ry="36"/>
            <ellipse
              className={`ring-fg ${ringClass}`}
              cx="50" cy="50" rx="28" ry="36"
              strokeDasharray={OVAL_CIRC}
              strokeDashoffset={phase === 'positioning' ? coverageOffset : 0}
              transform="rotate(-90 50 50)"
            />
            {/* corner ticks around the oval */}
            {[0, 90, 180, 270].map((deg, i) => {
              const rad = deg * Math.PI / 180;
              const x1 = 50 + Math.cos(rad) * 28;
              const y1 = 50 + Math.sin(rad) * 36;
              const x2 = 50 + Math.cos(rad) * (28 + 3);
              const y2 = 50 + Math.sin(rad) * (36 + 3);
              const on = (i === 0 && challenges.first) ||
                         (i === 1 && challenges.blink) ||
                         (i === 2 && challenges.second) ||
                         (phase === 'locking' || phase === 'captured');
              return (
                <line key={i} className={`guide-tick ${on ? 'on' : ''}`}
                  x1={x1} y1={y1} x2={x2} y2={y2}/>
              );
            })}
          </svg>
        )}

        {/* Prompt banner + liveness step pills */}
        {(phase !== 'idle' && phase !== 'captured') && (
          <>
            <div className={`bio-prompt ${ringClass==='ok'?'ok':''}`}>
              {promptArrow && <span className={`bio-arrow ${ringClass==='ok'?'ok':''}`}>{promptArrow}</span>}
              <span>{promptTxt}</span>
            </div>
            <div className="bio-steps">
              <span className={`bio-step-pill ${
                phase === 'challenge-1' ? 'active' : challenges.first ? 'done' : ''}`}>Turn 1</span>
              <span className={`bio-step-pill ${
                phase === 'challenge-2' ? 'active' : challenges.second ? 'done' : ''}`}>Turn 2</span>
              <span className={`bio-step-pill ${
                phase === 'blink' ? 'active' : challenges.blink ? 'done' : ''}`}>Blink</span>
              <span className={`bio-step-pill ${
                phase === 'locking' ? 'active' : phase === 'captured' ? 'done' : ''}`}>Lock</span>
            </div>
          </>
        )}

        {/* Live quality HUD */}
        {(phase !== 'idle' && phase !== 'loading' && phase !== 'captured') && (
          <div className="bio-metrics">
            <div className={`bio-metric ${metricOK.cover ? 'ok' : (hud.faceSeen ? 'bad' : '')}`}>
              <div className="bio-metric-lbl">Coverage</div>
              <div className="bio-metric-val">{hud.coverage}%</div>
            </div>
            <div className={`bio-metric ${metricOK.yaw ? 'ok' : 'bad'}`}>
              <div className="bio-metric-lbl">Yaw</div>
              <div className="bio-metric-val">{hud.yawDeg.toFixed(1)}°</div>
            </div>
            <div className={`bio-metric ${metricOK.bright ? 'ok' : 'bad'}`}>
              <div className="bio-metric-lbl">
                Light{hud.sideLit && <span style={{marginLeft:6,fontSize:'9px',color:'#f5b944',letterSpacing:'.08em'}}>◐ SIDE</span>}
              </div>
              <div className="bio-metric-val">{hud.brightness}</div>
            </div>
            <div className={`bio-metric ${metricOK.sharp ? 'ok' : 'bad'}`}>
              <div className="bio-metric-lbl">Sharp</div>
              <div className="bio-metric-val">{hud.sharpness.toFixed(1)}</div>
            </div>
          </div>
        )}

        {/* Capture success flash + stamp */}
        {phase === 'captured' && <div className="bio-flash"/>}
        {phase === 'captured' && (
          <div className="bio-captured-stamp">
            <strong>✓ Locked</strong>
            Best frame captured
          </div>
        )}

        <div className="scan-corner tl"/><div className="scan-corner tr"/>
        <div className="scan-corner bl"/><div className="scan-corner br"/>

        <div className="scan-status">
          {errMsg
            ? errMsg
            : phase === 'idle'       ? (scanned ? '✓ Scan complete' : 'Ready · Biometric grade')
            : phase === 'loading'    ? 'Initialising GPU inference…'
            : phase === 'positioning'? 'Positioning'
            : phase === 'challenge-1'? 'Liveness 1 / 3'
            : phase === 'challenge-2'? 'Liveness 2 / 3'
            : phase === 'blink'      ? 'Liveness 3 / 3'
            : phase === 'locking'    ? 'Auto-capture'
            : '✓ Locked'}
        </div>
      </div>

      <div className="bio-privacy">100% local · GPU inference · no upload</div>

      <div className="chips-grid">
        <Chip label="Face Shape" value={chipData?chipData.faceShape:'—'}
              sub={chipData?chipData.faceShapeSub:'Not yet detected'}/>
        <Chip label="Skin Tone" value={chipData?chipData.tone:'—'}
              sub={chipData?chipData.toneSub:'Not yet detected'}/>
        <Chip label="Undertone" value={chipData?chipData.undertone:'—'}
              sub={chipData?chipData.undertoneSub:'Not yet detected'}/>
        <Chip label="Skin Type" value={chipData?chipData.skinType:'—'}
              sub={chipData?chipData.skinTypeSub:'Not yet detected'}/>
      </div>

      <button
        className={`scan-btn ${phase !== 'idle' && scanState !== 'done' ? 'active' : ''}`}
        onClick={begin}
        disabled={phase !== 'idle' || scanState === 'scanning'}
      >
        {phase === 'idle' && scanState !== 'done' && '✦ Begin biometric scan'}
        {phase === 'idle' && scanState === 'done' && '✦ Scan again'}
        {phase === 'loading' && 'Loading models…'}
        {phase === 'positioning' && 'Position your face…'}
        {(phase === 'challenge-1' || phase === 'challenge-2') && 'Liveness challenge…'}
        {phase === 'blink' && 'Awaiting blink…'}
        {phase === 'locking' && 'Auto-capturing…'}
        {phase === 'captured' && 'Captured — analysing'}
      </button>
    </div>
  );
}

function Chip({ label, value, sub }) {
  return (
    <div className="chip">
      <div className="chip-lbl">{label}</div>
      <div className="chip-val">{value}</div>
      <div className="chip-sub">{sub}</div>
    </div>
  );
}

window.LumaScanner = Scanner;

})();
</script>

<script type="text/babel" data-presets="react" data-label="Filters">
(function(){
/* global React */
const { useState } = React;

function Filters({
  budget, setBudget,
  prefs, setPrefs,
  concerns, setConcerns,
  coverage, setCoverage,
  preferredBrands, setPreferredBrands
}) {
  const togglePref = id => setPrefs(p => p.includes(id)?p.filter(x=>x!==id):[...p,id]);
  const toggleConcern = c => setConcerns(p => p.includes(c)?p.filter(x=>x!==c):[...p,c]);
  const toggleBrand = b => setPreferredBrands && setPreferredBrands(
    (preferredBrands||[]).includes(b)
      ? (preferredBrands||[]).filter(x=>x!==b)
      : [...(preferredBrands||[]), b]
  );
  const pct = ((budget-5)/(300-5)*100).toFixed(0)+'%';

  // Unique, alphabetical brand list from the product catalog.
  const allBrands = React.useMemo(() => {
    const s = new Set();
    (window.LUMA_PRODUCTS || []).forEach(p => p.brand && s.add(p.brand));
    return Array.from(s).sort((a,b) => a.localeCompare(b));
  }, []);

  const [brandQuery, setBrandQuery] = React.useState('');
  const q = brandQuery.trim().toLowerCase();
  const visibleBrands = q ? allBrands.filter(b => b.toLowerCase().includes(q)) : allBrands;
  const selectedSet = new Set(preferredBrands || []);

  return (
    <div className="filters-wrap">
      <div className="section-eyebrow">Filters</div>

      <div className="filter-group">
        <div className="filter-title">Budget Range</div>
        <div className="budget-labels"><span>Budget</span><span>Mid</span><span>Luxury</span></div>
        <input type="range" min="5" max="300" value={budget}
          onChange={e=>setBudget(+e.target.value)}
          style={{'--val':pct}}/>
        <div className="budget-val">Up to £{budget}</div>
      </div>

      <div className="filter-group">
        <div className="filter-title">Preferences</div>
        <div className="toggle-grid">
          {window.LUMA_PREFS.map(p => (
            <button key={p.id} className={`toggle ${prefs.includes(p.id)?'on':''}`} onClick={()=>togglePref(p.id)}>
              <span className="toggle-dot"/>{p.label}
            </button>
          ))}
        </div>
      </div>

      <div className="filter-group">
        <div className="filter-title">Skin Concerns</div>
        <div className="tag-row">
          {window.LUMA_CONCERNS.map(c => (
            <button key={c} className={`tag ${concerns.includes(c)?'active':''}`} onClick={()=>toggleConcern(c)}>{c}</button>
          ))}
        </div>
      </div>

      <div className="filter-group">
        <div className="filter-title">Foundation Coverage</div>
        <div className="tag-row">
          {['Light','Medium','Full','Buildable'].map(c => (
            <button key={c} className={`tag ${coverage===c?'active':''}`} onClick={()=>setCoverage(coverage===c?'':c)}>{c}</button>
          ))}
        </div>
      </div>

      {/* Preferred Brands — highlight-only, never filters them out. */}
      <div className="filter-group">
        <div className="filter-title" style={{display:'flex',alignItems:'center',justifyContent:'space-between'}}>
          <span>Preferred Brands</span>
          {selectedSet.size > 0 && (
            <button
              onClick={()=>setPreferredBrands && setPreferredBrands([])}
              style={{
                background:'transparent',border:'none',color:'rgba(255,255,255,.5)',
                font:'inherit',fontSize:10,letterSpacing:'.1em',
                textTransform:'uppercase',cursor:'pointer'
              }}
              title="Clear all">Clear</button>
          )}
        </div>
        <div style={{fontSize:11,color:'rgba(255,255,255,.55)',margin:'0 0 10px',lineHeight:1.5}}>
          Favorites show a gold border in the marketplace. Nothing gets filtered out.
        </div>
        <input
          type="search"
          className="brand-chip-search"
          placeholder="Search brands…"
          value={brandQuery}
          onChange={e => setBrandQuery(e.target.value)}
        />
        <div className="brand-chip-row">
          {visibleBrands.map(b => (
            <button
              key={b}
              className={'brand-chip' + (selectedSet.has(b) ? ' on' : '')}
              onClick={() => toggleBrand(b)}>
              {b}
            </button>
          ))}
          {visibleBrands.length === 0 && (
            <div style={{fontSize:11,color:'rgba(255,255,255,.5)',padding:'6px 2px'}}>
              No brands match &ldquo;{brandQuery}&rdquo;.
            </div>
          )}
        </div>
      </div>
    </div>
  );
}
window.LumaFilters = Filters;

})();
</script>
