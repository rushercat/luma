<script type="text/babel" data-presets="react" data-label="Marketplace">
(function(){
/* global React */
const { useState } = React;

function Marketplace({ saved, setSaved, budget, prefs, concerns, coverage, preferredBrands }) {
  const [cat, setCat] = useState('Foundation');
  const [sort, setSort] = useState('match');
  const cats = window.LUMA_CATEGORIES;
  const favSet = React.useMemo(() => new Set(preferredBrands || []), [preferredBrands]);

  // --- Filter helpers ---------------------------------------------------
  // Map preference ids -> tag predicates (tags are case-sensitive strings on each product)
  const PREF_MATCH = {
    vegan:     p => p.tags.includes('Vegan'),
    cruelty:   p => p.tags.includes('Cruelty-free'),
    silicone:  p => p.tags.includes('Silicone-free'),
    paraben:   p => p.tags.includes('Paraben-free'),
    fragrance: p => p.tags.includes('Fragrance-free'),
    spf:       p => p.tags.some(t => /^SPF/i.test(t)),
  };

  // Map skin concerns -> keyword regex matched against name + desc + tags
  const CONCERN_MATCH = {
    'Acne':              /acne|blemish|salicylic|bha|pore|oily|oil-?free|matte|niacinamide|clear/i,
    'Dryness':           /hydrat|moistur|dry|hyaluronic|dewy|glow|plump|ceramide|squalane|nourish/i,
    'Oiliness':          /oily|oil-?free|matte|pore|shine|sebum|mattif|bha/i,
    'Redness':           /redness|calm|soothe|fragrance-?free|sensitive|aloe|ceramide|gentle/i,
    'Hyperpigmentation': /dark spot|even skin tone|brighten|niacinamide|vitamin c|ascorbic|tranexamic|arbutin|radian|discolor/i,
    'Fine Lines':        /fine line|wrinkle|anti-?aging|anti-ageing|peptide|retinol|firm|plump|youth|age/i,
    'Dark Circles':      /dark circle|under-?eye|brighten|caffeine|de-?puff|radian/i,
    'Pores':             /pore|blur|smooth|mattif|minimiz|niacinamide/i,
  };

  function productText(p) {
    return (p.name + ' ' + p.desc + ' ' + p.tags.join(' ')).toLowerCase();
  }

  // Coverage filter only meaningful on Foundation — score by keywords in name+desc
  const COVERAGE_MATCH = {
    'Light':     t => /(^|\W)(light|lightweight|weightless|tinted|sheer|skin-?like|luminous|natural|serum|super-?light|glow)(\W|$)/i.test(t),
    'Medium':    t => /(^|\W)(medium|buildable|medium-?to-?full|natural finish|satin)(\W|$)/i.test(t),
    'Full':      t => /(^|\W)(full|full-?coverage|long-?wear|longwear|24-?hour|16-?hour|camouflage)(\W|$)/i.test(t),
    'Buildable': t => /(^|\W)buildable(\W|$)/i.test(t),
  };

  // --- Build filtered list ----------------------------------------------
  let products = window.LUMA_PRODUCTS.filter(p => p.cat === cat);

  // Budget cap (applies to every category)
  products = products.filter(p => p.price <= budget);

  // Preferences: product must satisfy EVERY selected preference
  if (prefs && prefs.length) {
    products = products.filter(p => prefs.every(id => (PREF_MATCH[id] ? PREF_MATCH[id](p) : true)));
  }

  // Skin concerns: product must address at least ONE selected concern
  if (concerns && concerns.length) {
    products = products.filter(p => {
      const text = productText(p);
      return concerns.some(c => (CONCERN_MATCH[c] ? CONCERN_MATCH[c].test(text) : false));
    });
  }

  // Foundation coverage: only applied when viewing Foundation
  if (cat === 'Foundation' && coverage && COVERAGE_MATCH[coverage]) {
    products = products.filter(p => COVERAGE_MATCH[coverage](productText(p)));
  }

  if (sort==='price-asc') products = [...products].sort((a,b)=>a.price-b.price);
  else if (sort==='price-desc') products = [...products].sort((a,b)=>b.price-a.price);
  else if (sort==='match') products = [...products].sort((a,b)=>b.match-a.match);
  else if (sort==='rating') products = [...products].sort((a,b)=>b.match-a.match);

  // Stable-bubble preferred brands to the top so favorites are easy to spot
  // without hiding anything else.
  if (favSet.size > 0) {
    products = [...products].sort((a,b) => {
      const af = favSet.has(a.brand) ? 1 : 0;
      const bf = favSet.has(b.brand) ? 1 : 0;
      return bf - af;
    });
  }
  const totalAll = window.LUMA_PRODUCTS.filter(p => p.cat === cat).length;

  return (
    <section className="marketplace">
      <div className="mkt-header">
        <div className="mkt-top">
          <div>
            <h2 className="mkt-title">Your <em>Matches</em></h2>
            <div className="mkt-sub">Personalised to your skin tone &amp; preferences</div>
          </div>
          <div className="mkt-meta">
            <div className="mkt-count">{products.length} products</div>
            <div className="mkt-sub">Best match first</div>
          </div>
        </div>
        <div className="cat-tabs">
          {cats.map(c => (
            <button key={c} className={`cat-tab ${cat===c?'active':''}`} onClick={()=>setCat(c)}>{c}</button>
          ))}
        </div>
      </div>

      <div className="sort-bar">
        <div className="sort-left">
          <span className="sort-label">Sort</span>
          <button className={`sort-btn ${sort==='match'?'on':''}`} onClick={()=>setSort('match')}>Best Match</button>
          <button className={`sort-btn ${sort==='price-asc'?'on':''}`} onClick={()=>setSort('price-asc')}>Price ↑</button>
          <button className={`sort-btn ${sort==='price-desc'?'on':''}`} onClick={()=>setSort('price-desc')}>Price ↓</button>
          <button className={`sort-btn ${sort==='rating'?'on':''}`} onClick={()=>setSort('rating')}>Top Rated</button>
        </div>
        <div className="sort-count">Showing <em>{products.length}</em> of {totalAll}</div>
      </div>

      {products.length === 0 ? (
        <div className="prod-grid" style={{display:'block'}}>
          <div style={{
            padding:'48px 28px',textAlign:'center',
            border:'1px dashed rgba(255,255,255,.14)',borderRadius:18,
            background:'rgba(255,255,255,.02)',color:'rgba(255,255,255,.7)'}}>
            <div style={{fontSize:15,letterSpacing:'.04em',marginBottom:6,color:'var(--peach)'}}>No matches in this view</div>
            <div style={{fontSize:13,lineHeight:1.55,maxWidth:420,margin:'0 auto',opacity:.75}}>
              Try raising the budget, clearing a skin concern, or switching foundation coverage — your current filter combo is too strict for this category.
            </div>
          </div>
        </div>
      ) : (
        <div className="prod-grid">
          {products.map((p,i)=>{
            const key = p.brand + '|' + p.name;
            return (
              <window.LumaProductCard key={key} p={p}
                saved={saved.has(key)}
                favorite={favSet.has(p.brand)}
                onSave={()=>{const n=new Set(saved); n.has(key)?n.delete(key):n.add(key); setSaved(n);}}/>
            );
          })}
        </div>
      )}
    </section>
  );
}
window.LumaMarketplace = Marketplace;

})();
</script>
<script type="text/babel" data-presets="react" data-label="ScanModal+real-capture">
(function(){
/* global React */
const { useState: useStateM, useEffect: useEffectM, useRef: useRefM } = React;

function ScanModal({ open, onDone, onResults }) {
  const [step, setStep] = useStateM(0);
  const [err, setErr] = useStateM(null);
  const cancelledRef = useRefM(false);

  useEffectM(()=>{
    if (!open) { setStep(0); setErr(null); cancelledRef.current=false; return; }
    cancelledRef.current = false;
    let aborted = false;

    async function runScan(){
      const L = window.__luma;

      // Preferred path: Scanner already auto-captured biometric-grade frames.
      // Fallback: we still have a live video element (legacy flow).
      const preCanvases = Array.isArray(L.preCapturedCanvases) && L.preCapturedCanvases.length
        ? L.preCapturedCanvases.slice(0, 3)
        : null;

      if (!preCanvases) {
        // Wait for video to be ready (legacy live-analysis path)
        let tries=0;
        while((!L.videoEl || !L.videoEl.videoWidth) && tries<40 && !aborted){
          await new Promise(r=>setTimeout(r, 100));
          tries++;
        }
        if(aborted) return;
        if(!L.videoEl || !L.videoEl.videoWidth){
          setErr('Camera not ready — close and try again.');
          return;
        }
        // Wait a bit for exposure/WB
        await new Promise(r=>setTimeout(r, 800));
        if(aborted) return;
      }

      // Kick off face-api load in parallel
      const apiPromise = L.ensureFaceApi();

      // 5 animated steps; capture 3 frames distributed across them
      const captures = [];
      const steps = [
        { label:'Face & landmark detection',      capture: true,  delay: 500 },
        { label:'Melanin & skin zone mapping',    capture: true,  delay: 600 },
        { label:'Multi-frame tone sampling',      capture: true,  delay: 600 },
        { label:'ITA phototype & undertone',      capture: false, delay: 600 },
        { label:'Shade matching & recommendations', capture: false, delay: 600 },
      ];
      let capIdx = 0;
      for(let i=0; i<steps.length; i++){
        if(aborted) return;
        setStep(i+1);
        if(steps[i].capture){
          // Use pre-captured biometric frames when available, else grab live.
          const source = preCanvases
            ? preCanvases[Math.min(capIdx, preCanvases.length - 1)]
            : L.videoEl;
          const frame = await L.captureFrame(source);
          if(frame) captures.push(frame);
          capIdx++;
        }
        await new Promise(r=>setTimeout(r, steps[i].delay));
      }
      if(aborted) return;

      // Validate captures
      const goodFrames = captures.filter(c=>c && c.faceFound);
      if(goodFrames.length < 1){
        setErr('No face detected during scan — try better lighting.');
        return;
      }
      // Merge and match tone
      const merged = L.mergeCaptures(captures);
      if(!merged){
        setErr('Could not read skin pixels — try again in better light.');
        return;
      }
      const {tone, ita, confidence} = L.findBestTone(merged);
      const skinInfo = L.classifySkinType(captures);

      // face-api analysis — retry across every captured frame and the live
      // video element, then fall back to a face-box aspect-ratio estimate.
      await apiPromise.catch(()=>{});
      // If models are still loading, give them up to ~2s more before giving up.
      for(let w=0; w<20 && !window.__faceApiReady; w++){
        await new Promise(r=>setTimeout(r, 100));
      }

      let api = null;
      if(window.__faceApiReady){
        // Freshest frame first (best exposure/WB), then older ones.
        const ordered = [...captures].reverse().filter(c=>c && c.canvas);
        for(const c of ordered){
          if(aborted) return;
          api = await L.analyzeFaceWithApi(c.canvas);
          if(api) break;
        }
        // Last-ditch: run on the live video element directly (full-res source
        // often succeeds where a downscaled capture did not).
        if(!api && L.videoEl && L.videoEl.videoWidth){
          api = await L.analyzeFaceWithApi(L.videoEl);
        }
        // If we used pre-captured frames, also try them directly at full res.
        if(!api && preCanvases){
          for (const c of preCanvases) {
            if(aborted) return;
            api = await L.analyzeFaceWithApi(c);
            if(api) break;
          }
        }
      }

      // Fallback: derive a coarse face shape from the captured face-box
      // proportions so we never show "Landmarks unavailable" when we actually
      // did find a face.
      let derivedShape = null;
      if(!api){
        const lg = [...captures].reverse().find(c=>c && c.faceFound && c.faceBox);
        if(lg){
          const ratio = lg.faceBox.w / lg.faceBox.h;
          if(ratio > 0.95)      derivedShape = {shape:'Round',   sub:'Soft curves · estimated from proportions'};
          else if(ratio > 0.85) derivedShape = {shape:'Square',  sub:'Balanced width · estimated from proportions'};
          else if(ratio > 0.76) derivedShape = {shape:'Oval',    sub:'Balanced proportions · estimated'};
          else                  derivedShape = {shape:'Oblong',  sub:'Longer than wide · estimated from proportions'};
        }
      }

      const results = {
        tone, ita, confidence,
        rgb: merged,
        faceShape:    api ? api.shape : (derivedShape ? derivedShape.shape : 'Detected'),
        faceShapeSub: api ? (api.sub + (api.age?' · ~'+api.age+' yrs':''))
                          : (derivedShape ? derivedShape.sub : 'Landmarks unavailable'),
        skinType: skinInfo.type,
        skinTypeSub: skinInfo.sub,
        age: api ? api.age : null,
        expression: api ? api.expression : null,
      };

      if(aborted) return;
      onResults && onResults(results);
      setTimeout(()=>{ if(!aborted) onDone(); }, 600);
    }

    runScan().catch(e=>{
      console.warn('scan failed:', e);
      setErr('Scan failed: ' + (e.message||String(e)));
    });

    return ()=>{ aborted = true; cancelledRef.current=true; };
  }, [open]);

  if (!open) return null;
  const pct = Math.min(100, (step/5)*100);
  const labels = [
    'Face & landmark detection',
    'Melanin & skin zone mapping',
    'Multi-frame tone sampling',
    'ITA phototype & undertone',
    'Shade matching & recommendations',
  ];
  return (
    <div className="scan-modal">
      <div className="scan-modal-inner">
        <div className="ring-wrap">
          <svg viewBox="0 0 80 80">
            <circle cx="40" cy="40" r="35" fill="none" stroke="rgba(255,255,255,.15)" strokeWidth="2"/>
            <circle cx="40" cy="40" r="35" fill="none" stroke="#ffc9a8" strokeWidth="2" strokeLinecap="round"
              strokeDasharray="220" strokeDashoffset={220-(220*pct/100)}
              style={{transform:'rotate(-90deg)',transformOrigin:'50% 50%',transition:'stroke-dashoffset .4s'}}/>
          </svg>
          <div className="ring-pct">{Math.round(pct)}<span>%</span></div>
        </div>
        <h3 className="modal-title">{err ? 'Scan error' : 'Analysing your face'}</h3>
        <p className="modal-sub">{err || (labels[Math.min(step,4)]+'…')}</p>
        {err && (
          <button className="scan-btn" style={{marginTop:16, width:'auto'}} onClick={onDone}>Close</button>
        )}
        <div className="modal-steps">
          {labels.map((l,i)=>(
            <div key={i} className="modal-step">
              <span className={`step-ico ${i<step?'done':i===step?'active':''}`}>{i<step?'✓':i+1}</span>
              <span>{l}</span>
            </div>
          ))}
        </div>
      </div>
    </div>
  );
}
window.LumaScanModal = ScanModal;

})();
</script>
<script type="text/babel" data-presets="react" data-label="AuthModal">
(function(){
/* global React */
const { useState, useEffect, useRef } = React;

function AuthModal({ open, initialMode, onClose, onAuthed }){
  const [mode, setMode] = useState(initialMode === 'signup' ? 'signup' : 'signin');
  const [email, setEmail] = useState('');
  const [pin, setPin] = useState('');
  const [pin2, setPin2] = useState('');
  const [busy, setBusy] = useState(false);
  const [err, setErr] = useState('');
  const [notice, setNotice] = useState('');
  const emailRef = useRef(null);

  useEffect(() => {
    if (!open) return;
    setMode(initialMode === 'signup' ? 'signup' : 'signin');
    setPin(''); setPin2(''); setErr(''); setNotice('');
    setTimeout(() => emailRef.current && emailRef.current.focus(), 60);
  }, [open, initialMode]);

  // Escape closes
  useEffect(() => {
    if (!open) return;
    function onKey(e){ if (e.key === 'Escape') onClose && onClose(); }
    window.addEventListener('keydown', onKey);
    return () => window.removeEventListener('keydown', onKey);
  }, [open, onClose]);

  if (!open) return null;

  const Auth = window.LumaAuth;
  const configured = Auth && Auth.isConfigured();

  function digitsOnly(v){ return (v||'').replace(/\D+/g,'').slice(0,6); }

  async function submit(e){
    e && e.preventDefault && e.preventDefault();
    setErr(''); setNotice('');
    if (!Auth) { setErr('Auth is not available.'); return; }
    if (!configured) {
      setErr('Cloud profile is not configured yet. See supabase-schema.sql for setup.');
      return;
    }
    if (mode === 'signup' && pin !== pin2) {
      setErr('PINs do not match.'); return;
    }
    setBusy(true);
    try {
      const fn = mode === 'signup' ? Auth.signUp : Auth.signIn;
      const { data, error } = await fn(email, pin);
      if (error) {
        setErr(error.message || 'Something went wrong. Please try again.');
      } else if (mode === 'signup' && data && data.user && !data.session) {
        // Email confirmation ON → no session yet.
        setNotice('Almost done! Check your email to verify your account, then sign in.');
        setMode('signin');
      } else {
        onAuthed && onAuthed(data && data.session || null);
        onClose && onClose();
      }
    } catch(x) {
      setErr((x && x.message) || 'Unexpected error.');
    } finally {
      setBusy(false);
    }
  }

  return (
    <div className="auth-backdrop" onClick={(e)=>{ if(e.target===e.currentTarget) onClose && onClose(); }}>
      <div className="auth-card" role="dialog" aria-modal="true" aria-label="Sign in">
        <button className="auth-close" aria-label="Close" onClick={onClose}>×</button>
        <div className="auth-brand">L<span>UM</span>A</div>
        <div className="auth-subtitle">{mode === 'signup' ? 'Create your profile' : 'Welcome back'}</div>

        <div className="auth-tabs" role="tablist">
          <button className={'auth-tab'+(mode==='signin'?' active':'')} onClick={()=>{setMode('signin'); setErr(''); setNotice('');}}>Sign in</button>
          <button className={'auth-tab'+(mode==='signup'?' active':'')} onClick={()=>{setMode('signup'); setErr(''); setNotice('');}}>Create</button>
        </div>

        {!configured && (
          <div className="auth-unconfigured">
            <strong>Offline mode</strong>
            Cloud profile sync is not configured yet. Open <code>index.html</code> and set
            <code> LUMA_SUPABASE_URL</code> + <code>LUMA_SUPABASE_ANON_KEY</code> to enable accounts.
          </div>
        )}

        {err && <div className="auth-error">{err}</div>}
        {notice && <div className="auth-success">{notice}</div>}

        <form onSubmit={submit} autoComplete="on">
          <div className="auth-field">
            <label className="auth-label" htmlFor="auth-email">Email</label>
            <input
              id="auth-email" ref={emailRef}
              className="auth-input"
              type="email" inputMode="email" autoComplete="email"
              placeholder="you@example.com"
              value={email} onChange={(e)=>setEmail(e.target.value)}
              required
            />
          </div>

          <div className="auth-field">
            <label className="auth-label" htmlFor="auth-pin">6-digit PIN</label>
            <input
              id="auth-pin"
              className="auth-input auth-pin-input"
              type="password" inputMode="numeric" autoComplete={mode==='signup'?'new-password':'current-password'}
              maxLength={6} placeholder="••••••"
              value={pin} onChange={(e)=>setPin(digitsOnly(e.target.value))}
              required
            />
            {mode==='signup' && (
              <div className="auth-help">Choose any 6 digits. This PIN protects your profile — don't share it.</div>
            )}
          </div>

          {mode === 'signup' && (
            <div className="auth-field">
              <label className="auth-label" htmlFor="auth-pin2">Confirm PIN</label>
              <input
                id="auth-pin2"
                className="auth-input auth-pin-input"
                type="password" inputMode="numeric" autoComplete="new-password"
                maxLength={6} placeholder="••••••"
                value={pin2} onChange={(e)=>setPin2(digitsOnly(e.target.value))}
                required
              />
            </div>
          )}

          <button className="auth-submit" type="submit"
            disabled={busy || !email || pin.length!==6 || (mode==='signup' && pin2.length!==6)}>
            {busy ? 'Please wait…' : (mode === 'signup' ? 'Create profile' : 'Sign in')}
          </button>
        </form>

        <div className="auth-footer">
          {mode === 'signup'
            ? <>We store <b>derived metrics only</b> — face shape, tone, preferences. <br/>No face images or biometric data are saved.</>
            : <>Forgot your PIN? Create a new profile with a different email.</>
          }
        </div>
      </div>
    </div>
  );
}

window.LumaAuthModal = AuthModal;

})();
</script>
<script type="text/babel" data-presets="react" data-label="ProfileView">
(function(){
/* global React */
const { useState, useEffect } = React;

function fmtDate(s){
  if (!s) return '—';
  try {
    const d = new Date(s);
    return d.toLocaleDateString(undefined,{year:'numeric',month:'short',day:'numeric'}) +
           ' · ' + d.toLocaleTimeString(undefined,{hour:'2-digit',minute:'2-digit'});
  } catch(_) { return String(s); }
}
function initialOf(email){
  if (!email) return '?';
  const c = email.trim()[0];
  return c ? c.toUpperCase() : '?';
}

function ProfileView({ user, onSignOut, onBack, onAccountDeleted }){
  const [latest, setLatest] = useState(null);
  const [history, setHistory] = useState([]);
  const [prefs, setPrefs] = useState(null);
  const [savedList, setSavedList] = useState([]);
  const [savedOpen, setSavedOpen] = useState(false);
  const [loading, setLoading] = useState(true);
  const [confirmOpen, setConfirmOpen] = useState(false);
  const [confirmText, setConfirmText] = useState('');
  const [deleting, setDeleting] = useState(false);
  const [delErr, setDelErr] = useState('');

  // Admin-only visitor analytics (loaded separately so non-admins never hit it)
  const isAdmin = !!(window.LumaAuth && window.LumaAuth.isAdminUser && window.LumaAuth.isAdminUser(user));
  const [analytics, setAnalytics] = useState(null);
  const [analyticsLoading, setAnalyticsLoading] = useState(isAdmin);

  // Build a quick lookup over the product catalog so we can render a
  // swatch dot + category for each saved row.
  const productIndex = React.useMemo(() => {
    const idx = {};
    (window.LUMA_PRODUCTS || []).forEach(p => {
      idx[(p.brand||'') + '|' + (p.name||'')] = p;
    });
    return idx;
  }, []);

  useEffect(() => {
    let alive = true;
    (async () => {
      const Auth = window.LumaAuth;
      if (!Auth) return;
      setLoading(true);
      const [scans, p, saved] = await Promise.all([
        Auth.listScans(20),
        Auth.getPreferences(),
        Auth.listSavedProducts(),
      ]);
      if (!alive) return;
      setHistory(scans || []);
      setLatest((scans && scans[0]) || null);
      setPrefs(p || null);
      setSavedList(saved || []);
      setLoading(false);
    })();
    return () => { alive = false; };
  }, [user && user.id]);

  // Load analytics separately — only if this user is the admin.
  useEffect(() => {
    if (!isAdmin) { setAnalytics(null); setAnalyticsLoading(false); return; }
    let alive = true;
    (async () => {
      setAnalyticsLoading(true);
      try {
        const a = await window.LumaAuth.getVisitAnalytics();
        if (!alive) return;
        setAnalytics(a);
      } catch(_) {
        if (alive) setAnalytics(null);
      } finally {
        if (alive) setAnalyticsLoading(false);
      }
    })();
    return () => { alive = false; };
  }, [isAdmin, user && user.id]);

  // Tiny helper: ISO-2 country code → flag emoji.
  function flagOf(cc){
    if (!cc || cc.length !== 2) return '';
    const A = 0x1F1E6;
    const up = cc.toUpperCase();
    return String.fromCodePoint(A + up.charCodeAt(0) - 65) +
           String.fromCodePoint(A + up.charCodeAt(1) - 65);
  }

  const email = (user && user.email) || '';

  return (
    <div className="profile-wrap">
      <div className="profile-header">
        <div className="profile-avatar">{initialOf(email)}</div>
        <div className="profile-heading">
          <h1>My Profile</h1>
          <div className="profile-email">{email}</div>
        </div>
        <button className="profile-signout" onClick={onSignOut}>Sign out</button>
      </div>

      <div className="profile-grid">
        {/* Admin-only: Visitor Analytics */}
        {isAdmin && (
          <div className="profile-card profile-card-admin">
            <h3>
              <span className="profile-admin-badge">ADMIN</span>
              Visitor Analytics
            </h3>
            {analyticsLoading ? (
              <div className="profile-empty">Loading analytics…</div>
            ) : !analytics ? (
              <div className="profile-empty">
                No data yet. Once visitors land on the site, their (approximate)
                country and city show up here. Make sure the <code>visits</code> table
                exists in Supabase.
              </div>
            ) : (
              <>
                <div className="profile-admin-stats">
                  <div className="profile-admin-stat">
                    <div className="profile-admin-stat-num">{analytics.todayCount}</div>
                    <div className="profile-admin-stat-lbl">Views today</div>
                  </div>
                  <div className="profile-admin-stat">
                    <div className="profile-admin-stat-num">{analytics.last7Count}</div>
                    <div className="profile-admin-stat-lbl">Last 7 days</div>
                  </div>
                </div>

                <div className="profile-admin-sub">Top countries · last 7 days</div>
                {analytics.topCountries.length === 0 ? (
                  <div className="profile-empty" style={{marginTop:4}}>No visits yet.</div>
                ) : (
                  <div className="profile-admin-countries">
                    {analytics.topCountries.map(c => (
                      <div key={(c.country_code||c.country)} className="profile-admin-country">
                        <span className="profile-admin-flag">{flagOf(c.country_code)}</span>
                        <span className="profile-admin-cname">{c.country || c.country_code || 'Unknown'}</span>
                        <span className="profile-admin-ccount">{c.count}</span>
                      </div>
                    ))}
                  </div>
                )}
              </>
            )}
          </div>
        )}

        {/* Latest scan */}
        <div className="profile-card">
          <h3>Latest Scan</h3>
          {loading ? <div className="profile-empty">Loading…</div>
            : latest ? (
              <>
                <div className="profile-kv">
                  <span className="profile-kv-k">Face shape</span>
                  <span className="profile-kv-v">{latest.face_shape || '—'}{latest.face_shape_sub ? ' · '+latest.face_shape_sub : ''}</span>
                </div>
                <div className="profile-kv">
                  <span className="profile-kv-k">Tone</span>
                  <span className="profile-kv-v">
                    {latest.tone_color && <span className="profile-tone-dot" style={{background:latest.tone_color}}></span>}
                    {latest.tone_name || '—'}
                  </span>
                </div>
                <div className="profile-kv">
                  <span className="profile-kv-k">Undertone</span>
                  <span className="profile-kv-v">{latest.tone_undertone || '—'}</span>
                </div>
                <div className="profile-kv">
                  <span className="profile-kv-k">ITA</span>
                  <span className="profile-kv-v">{latest.ita != null ? Number(latest.ita).toFixed(1) : '—'}</span>
                </div>
                <div className="profile-kv">
                  <span className="profile-kv-k">Skin type</span>
                  <span className="profile-kv-v">{latest.skin_type || '—'}{latest.skin_type_sub ? ' · '+latest.skin_type_sub : ''}</span>
                </div>
                <div className="profile-kv">
                  <span className="profile-kv-k">Captured</span>
                  <span className="profile-kv-v">{fmtDate(latest.created_at)}</span>
                </div>
              </>
            ) : (
              <div className="profile-empty">No scans yet. Run the scanner on the home page to save your first one.</div>
            )
          }
        </div>

        {/* Preferences */}
        <div className="profile-card">
          <h3>Preferences</h3>
          {loading ? <div className="profile-empty">Loading…</div>
            : prefs ? (
              <>
                <div className="profile-kv">
                  <span className="profile-kv-k">Budget</span>
                  <span className="profile-kv-v">{prefs.budget != null ? '$' + prefs.budget : '—'}</span>
                </div>
                <div className="profile-kv">
                  <span className="profile-kv-k">Coverage</span>
                  <span className="profile-kv-v">{prefs.coverage || '—'}</span>
                </div>
                <div className="profile-kv">
                  <span className="profile-kv-k">Preferences</span>
                  <span className="profile-kv-v">{(prefs.prefs && prefs.prefs.length) ? prefs.prefs.join(', ') : '—'}</span>
                </div>
                <div className="profile-kv">
                  <span className="profile-kv-k">Concerns</span>
                  <span className="profile-kv-v">{(prefs.concerns && prefs.concerns.length) ? prefs.concerns.join(', ') : '—'}</span>
                </div>
                <div className="profile-kv">
                  <span className="profile-kv-k">Updated</span>
                  <span className="profile-kv-v">{fmtDate(prefs.updated_at)}</span>
                </div>
              </>
            ) : (
              <div className="profile-empty">No preferences saved yet. Adjust the filters on the home page.</div>
            )
          }
        </div>

        {/* Saved products (click to expand) */}
        <div className={'profile-card profile-card-saved' + (savedOpen ? ' open' : '')}>
          <button
            type="button"
            className="profile-saved-toggle"
            aria-expanded={savedOpen}
            onClick={() => setSavedOpen(o => !o)}>
            <h3 style={{margin:0}}>Saved Products</h3>
            <span className="profile-saved-count">
              {loading ? '…' : savedList.length}
              <span className={'profile-saved-caret' + (savedOpen ? ' open' : '')} aria-hidden="true">▾</span>
            </span>
          </button>

          {!loading && savedList.length === 0 && (
            <div className="profile-empty" style={{marginTop:8}}>
              Tap the heart on any product to save it here.
            </div>
          )}

          {savedOpen && !loading && savedList.length > 0 && (
            <div className="profile-saved-list">
              {savedList.map(row => {
                const p = productIndex[row.brand + '|' + row.name];
                const swatch = p && p.swatches && p.swatches[0];
                return (
                  <div key={row.brand + '|' + row.name} className="profile-saved-row">
                    <span className="profile-saved-dot" style={{background: swatch || 'rgba(255,255,255,.15)'}} />
                    <div className="profile-saved-meta">
                      <div className="profile-saved-brand">{row.brand}</div>
                      <div className="profile-saved-name">{row.name}</div>
                      <div className="profile-saved-sub">
                        {p && p.cat ? p.cat + ' · ' : ''}
                        {p && typeof p.price === 'number' ? '$' + p.price + ' · ' : ''}
                        Saved {fmtDate(row.saved_at)}
                      </div>
                    </div>
                    <button
                      className="profile-saved-remove"
                      aria-label={'Remove ' + row.name}
                      title="Remove"
                      onClick={async () => {
                        setSavedList(list => list.filter(r => !(r.brand===row.brand && r.name===row.name)));
                        try { await window.LumaAuth.removeSavedProduct(row.brand, row.name); }
                        catch(e) { console.warn('[LUMA] unsave failed', e); }
                      }}>
                      ×
                    </button>
                  </div>
                );
              })}
            </div>
          )}
        </div>
      </div>

      {/* Scan history */}
      <div className="profile-section-title">Scan History</div>
      {loading ? <div className="profile-empty">Loading…</div>
        : history.length === 0 ? (
          <div className="profile-empty">You haven't saved any scans yet.</div>
        ) : (
          <div className="profile-history">
            {history.map(h => (
              <div key={h.id} className="profile-history-row">
                <div className="profile-history-date">{fmtDate(h.created_at)}</div>
                <div className="profile-history-meta">
                  {h.tone_color && <span className="profile-tone-dot" style={{background:h.tone_color}}></span>}
                  <b>{h.tone_name || '—'}</b>
                  {h.face_shape ? <> · {h.face_shape}</> : null}
                  {h.skin_type ? <> · {h.skin_type}</> : null}
                  {h.ita != null ? <> · ITA {Number(h.ita).toFixed(0)}</> : null}
                </div>
              </div>
            ))}
          </div>
        )
      }

      <div className="profile-danger" style={{borderColor:'rgba(255,255,255,.1)',background:'rgba(255,255,255,.02)'}}>
        <h3 style={{color:'rgba(255,255,255,.7)'}}>Privacy</h3>
        <p>
          LUMA never stores face images, landmarks, or any biometric data — cloud or local.
          Only the derived metrics shown above are saved to your profile.
        </p>
      </div>

      <div className="profile-danger">
        <h3>Delete account</h3>
        <p>
          Permanently remove your account and everything linked to it — scan history,
          preferences, and saved products. This cannot be undone.
        </p>
        <button onClick={()=>{ setDelErr(''); setConfirmText(''); setConfirmOpen(true); }}>
          Delete my account
        </button>
      </div>

      {confirmOpen && (
        <div className="auth-backdrop" onClick={(e)=>{ if(e.target===e.currentTarget && !deleting) setConfirmOpen(false); }}>
          <div className="auth-card" role="dialog" aria-modal="true" aria-label="Delete account">
            {!deleting && (
              <button className="auth-close" aria-label="Close" onClick={()=>setConfirmOpen(false)}>×</button>
            )}
            <div className="auth-brand" style={{color:'#f8a89c'}}>Delete account</div>
            <div className="auth-subtitle" style={{color:'rgba(248,168,156,.75)'}}>This cannot be undone</div>
            <p style={{fontSize:13,lineHeight:1.6,color:'rgba(255,255,255,.8)',margin:'0 0 18px'}}>
              We'll permanently delete your account, scan history, preferences and saved products.
              To confirm, type <b style={{color:'#fff'}}>DELETE</b> below.
            </p>
            {delErr && <div className="auth-error">{delErr}</div>}
            <div className="auth-field">
              <input
                className="auth-input"
                type="text" autoComplete="off" autoCapitalize="characters"
                placeholder="Type DELETE to confirm"
                value={confirmText}
                onChange={(e)=>setConfirmText(e.target.value)}
                disabled={deleting}
              />
            </div>
            <button
              className="auth-submit"
              style={{background:'linear-gradient(135deg,#e88a7a,#c86860)',color:'#fff'}}
              disabled={deleting || confirmText.trim().toUpperCase() !== 'DELETE'}
              onClick={async ()=>{
                setDeleting(true); setDelErr('');
                try {
                  const { error } = await window.LumaAuth.deleteMyAccount();
                  if (error) {
                    setDelErr(error.message || 'Could not delete the account. Please try again.');
                    setDeleting(false);
                    return;
                  }
                  setConfirmOpen(false);
                  onAccountDeleted && onAccountDeleted();
                } catch(x){
                  setDelErr((x && x.message) || 'Unexpected error.');
                  setDeleting(false);
                }
              }}>
              {deleting ? 'Deleting…' : 'Yes, delete my account'}
            </button>
            {!deleting && (
              <div style={{textAlign:'center',marginTop:14}}>
                <button className="profile-signout" onClick={()=>setConfirmOpen(false)}>Cancel</button>
              </div>
            )}
          </div>
        </div>
      )}

      <div style={{textAlign:'center',marginTop:30}}>
        <button className="profile-signout" onClick={onBack}>← Back to scanner</button>
      </div>
    </div>
  );
}

window.LumaProfileView = ProfileView;

})();
</script>
<script type="text/babel" data-presets="react" data-label="BrandsView">
(function(){
/* global React */
const { useState, useMemo } = React;

// Group all products by brand and return an alphabetical list of
// { brand, count, swatches: [colors…], cats: [categories…] }.
function buildBrandIndex(){
  const all = window.LUMA_PRODUCTS || [];
  const by = new Map();
  for (const p of all){
    const key = p.brand || 'Unknown';
    if (!by.has(key)) by.set(key, { brand: key, count: 0, swatches: [], cats: new Set() });
    const b = by.get(key);
    b.count += 1;
    if (p.swatches && p.swatches.length && b.swatches.length < 4) {
      b.swatches.push(p.swatches[0]);
    }
    if (p.cat) b.cats.add(p.cat);
  }
  return Array.from(by.values())
    .map(b => ({ ...b, cats: Array.from(b.cats) }))
    .sort((a,b) => a.brand.localeCompare(b.brand));
}

function BrandStripe({ swatches }){
  // Fill to 4 stops for a clean gradient even if the brand has few products.
  const s = (swatches && swatches.length) ? swatches : ['#3a4670','#2a3460'];
  const stops = s.length >= 4 ? s : s.concat(Array(4 - s.length).fill(s[s.length-1]));
  const grad = 'linear-gradient(90deg, ' + stops.join(', ') + ')';
  return <div className="brand-card-stripe" style={{background: grad}} />;
}

function BrandsView({ onBack, saved, setSaved }){
  const brands = useMemo(buildBrandIndex, []);
  const [selected, setSelected] = useState(null); // brand name or null
  const [query, setQuery] = useState('');

  const q = query.trim().toLowerCase();
  const filtered = q
    ? brands.filter(b => b.brand.toLowerCase().includes(q))
    : brands;

  if (selected) {
    const products = (window.LUMA_PRODUCTS || []).filter(p => p.brand === selected);
    // Group by category so a long brand list feels organized.
    const byCat = new Map();
    for (const p of products) {
      const k = p.cat || 'Other';
      if (!byCat.has(k)) byCat.set(k, []);
      byCat.get(k).push(p);
    }
    // Keep category order consistent with LUMA_CATEGORIES.
    const catOrder = (window.LUMA_CATEGORIES || []).concat(['Other']);
    const sections = catOrder
      .filter(c => byCat.has(c))
      .map(c => ({ cat: c, items: byCat.get(c) }));

    return (
      <div className="brands-wrap">
        <div className="brands-head">
          <div>
            <h1>{selected}</h1>
            <div className="brands-sub">
              {products.length} product{products.length === 1 ? '' : 's'}
            </div>
          </div>
          <button className="brands-back" onClick={() => setSelected(null)}>← All brands</button>
        </div>

        {products.length === 0 ? (
          <div className="brands-empty">No products found for this brand.</div>
        ) : sections.map(sec => (
          <div className="brand-detail-section" key={sec.cat}>
            <div className="brand-detail-section-title">{sec.cat}</div>
            <div className="brand-detail-grid">
              {sec.items.map(p => {
                const key = p.brand + '|' + p.name;
                return (
                  <window.LumaProductCard key={key} p={p}
                    saved={saved && saved.has(key)}
                    favorite={false /* brand page already groups by brand; pill would be noisy */}
                    onSave={() => {
                      if (!setSaved) return;
                      const n = new Set(saved); n.has(key) ? n.delete(key) : n.add(key); setSaved(n);
                    }} />
                );
              })}
            </div>
          </div>
        ))}

        <div style={{textAlign:'center',marginTop:40}}>
          <button className="brands-back" onClick={onBack}>← Back to scanner</button>
        </div>
      </div>
    );
  }

  // Default: brand index
  return (
    <div className="brands-wrap">
      <div className="brands-head">
        <div>
          <h1>All <em>Brands</em></h1>
          <div className="brands-sub">Tap a brand to see every product we have from them.</div>
        </div>
        <button className="brands-back" onClick={onBack}>← Back to scanner</button>
      </div>

      <input
        className="brands-search"
        type="search"
        placeholder="Search brands…"
        value={query}
        onChange={e => setQuery(e.target.value)}
      />

      {filtered.length === 0 ? (
        <div className="brands-empty">No brands match &ldquo;{query}&rdquo;.</div>
      ) : (
        <div className="brands-grid">
          {filtered.map(b => (
            <button key={b.brand} className="brand-card" onClick={() => setSelected(b.brand)}>
              <BrandStripe swatches={b.swatches} />
              <div>
                <div className="brand-card-name">{b.brand}</div>
                <div className="brand-card-meta">
                  {b.count} product{b.count === 1 ? '' : 's'}
                  {b.cats.length ? ' · ' + (b.cats.length <= 2 ? b.cats.join(' · ') : (b.cats.length + ' categories')) : ''}
                </div>
              </div>
            </button>
          ))}
        </div>
      )}
    </div>
  );
}

window.LumaBrandsView = BrandsView;

})();
</script>
<script type="text/babel" data-presets="react" data-label="App">
(function(){
/* global React */
const { useState, useEffect, useRef } = React;

// ---- Helpers to shape scan results for persistence -------------------------
function scanResultToRow(res){
  if (!res) return null;
  const out = {};
  if (typeof res.faceShape === 'string')    out.face_shape = res.faceShape;
  if (typeof res.faceShapeSub === 'string') out.face_shape_sub = res.faceShapeSub;
  if (res.tone && typeof res.tone === 'object') {
    out.tone_id        = res.tone.id || null;
    out.tone_name      = res.tone.name || null;
    out.tone_color     = res.tone.color || null;
    out.tone_undertone = res.tone.undertone || null;
  }
  if (typeof res.ita === 'number')        out.ita = res.ita;
  if (typeof res.confidence === 'number') out.confidence = Math.round(res.confidence);
  if (typeof res.skinType === 'string')    out.skin_type = res.skinType;
  if (typeof res.skinTypeSub === 'string') out.skin_type_sub = res.skinTypeSub;
  // Pull liveness metadata from the shared bucket the Scanner fills in.
  const liveness = (window.__luma && window.__luma.liveness) || res.liveness || null;
  if (liveness) out.liveness = liveness;
  if (typeof res.expression === 'string') out.expression = res.expression;
  if (typeof res.age === 'number')        out.age = Math.round(res.age);
  return out;
}
function App() {
  // Scanner / product state
  const [scanState, setScanState] = useState('idle');
  const [modalOpen, setModalOpen] = useState(false);
  const [scanResults, setScanResults] = useState(null);
  const [tone, setTone] = useState(window.LUMA_TONES.light[1]);
  const [budget, setBudget] = useState(300);
  const [prefs, setPrefs] = useState([]);
  const [concerns, setConcerns] = useState([]);
  const [coverage, setCoverage] = useState('');
  const [preferredBrands, setPreferredBrands] = useState([]);
  const [saved, setSaved] = useState(new Set());

  // Auth + routing
  const [route, setRoute] = useState('home'); // 'home' | 'profile'
  const [user, setUser] = useState(null);
  const [authOpen, setAuthOpen] = useState(false);
  const [authMode, setAuthMode] = useState('signin');
  const [authReady, setAuthReady] = useState(false);
  const [toast, setToast] = useState(null); // {kind:'success'|'error', title, body}

  // Track what we've already synced so we don't echo server writes back.
  const hydratingRef = useRef(false);
  const lastPrefsSigRef = useRef('');
  const lastSavedSigRef = useRef('');

  // ---- Auth bootstrap -----------------------------------------------------
  useEffect(() => {
    const Auth = window.LumaAuth;
    if (!Auth) { setAuthReady(true); return; }
    let alive = true;

    // Detect arrival from an email verification / recovery / magic-link click.
    // Supabase drops tokens in location.hash which it processes automatically
    // (detectSessionInUrl:true); we just harvest the `type` to show a banner.
    try {
      const hashInfo = Auth.consumeAuthHash && Auth.consumeAuthHash();
      if (hashInfo) {
        if (hashInfo.kind === 'error') {
          setToast({ kind:'error', title:'Link problem',
            body: hashInfo.message || 'That link is invalid or has expired. Try signing in.' });
        } else if (hashInfo.kind === 'signup') {
          setToast({ kind:'success', title:'Account verified',
            body:'Welcome to LUMA — your email is confirmed and you\'re signed in.' });
        } else if (hashInfo.kind === 'recovery') {
          setToast({ kind:'success', title:'Recovery link used',
            body:'You can set a new PIN now.' });
        } else if (hashInfo.kind === 'magiclink') {
          setToast({ kind:'success', title:'Signed in',
            body:'You\'re signed in with a magic link.' });
        }
      }
    } catch(e){ /* non-fatal */ }

    (async () => {
      // Give detectSessionInUrl a moment to hydrate the session from the hash.
      await new Promise(r => setTimeout(r, 120));
      const s = await Auth.getSession();
      if (!alive) return;
      setUser(s && s.user ? s.user : null);
      setAuthReady(true);
    })();
    const unsub = Auth.onAuthChange((session) => {
      if (!alive) return;
      setUser(session && session.user ? session.user : null);
    });
    return () => { alive = false; unsub && unsub(); };
  }, []);

  // Auto-dismiss toast
  useEffect(() => {
    if (!toast) return;
    const t = setTimeout(() => setToast(null), 6500);
    return () => clearTimeout(t);
  }, [toast]);

  // ---- Rehydrate profile data on sign-in ---------------------------------
  useEffect(() => {
    if (!user) return;
    const Auth = window.LumaAuth;
    if (!Auth) return;
    let alive = true;
    (async () => {
      hydratingRef.current = true;
      try {
        const [p, sp, latest] = await Promise.all([
          Auth.getPreferences(),
          Auth.listSavedProducts(),
          Auth.latestScan(),
        ]);
        if (!alive) return;
        if (p) {
          if (typeof p.budget === 'number') setBudget(p.budget);
          if (Array.isArray(p.prefs))       setPrefs(p.prefs);
          if (Array.isArray(p.concerns))    setConcerns(p.concerns);
          if (typeof p.coverage === 'string') setCoverage(p.coverage || '');
          if (Array.isArray(p.preferred_brands)) setPreferredBrands(p.preferred_brands);
        }
        if (sp && sp.length) {
          const keys = new Set(sp.map(r => r.brand + '|' + r.name));
          setSaved(keys);
          lastSavedSigRef.current = Array.from(keys).sort().join(',');
        }
        if (latest && latest.tone_id && latest.tone_name && latest.tone_color) {
          setTone({
            id: latest.tone_id,
            name: latest.tone_name,
            color: latest.tone_color,
            undertone: latest.tone_undertone || ''
          });
        }
      } finally {
        // Let React flush state before we re-enable sync listeners.
        setTimeout(() => { hydratingRef.current = false; }, 60);
      }
    })();
    return () => { alive = false; };
  }, [user && user.id]);

  // ---- Persist preferences (debounced) -----------------------------------
  useEffect(() => {
    if (!user || hydratingRef.current) return;
    const Auth = window.LumaAuth;
    if (!Auth || !Auth.isConfigured()) return;
    const sig = JSON.stringify({ budget, prefs, concerns, coverage, preferredBrands, toneId: tone && tone.id });
    if (sig === lastPrefsSigRef.current) return;
    lastPrefsSigRef.current = sig;
    const t = setTimeout(() => {
      Auth.upsertPreferences({
        budget: Number(budget) || 0,
        prefs: prefs || [],
        concerns: concerns || [],
        coverage: coverage || null,
        preferred_brands: preferredBrands || [],
        selected_tone_id: (tone && tone.id) || null,
      }).catch(err => {
        // Graceful: if the preferred_brands column doesn't exist yet the insert
        // will succeed without it; only unexpected errors get logged.
        console.warn('[LUMA] upsert prefs failed:', err);
      });
    }, 600);
    return () => clearTimeout(t);
  }, [user && user.id, budget, prefs, concerns, coverage, preferredBrands, tone && tone.id]);

  // ---- Persist saved products (diff against last sig) --------------------
  useEffect(() => {
    if (!user || hydratingRef.current) return;
    const Auth = window.LumaAuth;
    if (!Auth || !Auth.isConfigured()) return;
    const keys = Array.from(saved || []).sort();
    const sig = keys.join(',');
    if (sig === lastSavedSigRef.current) return;
    const prev = new Set(lastSavedSigRef.current ? lastSavedSigRef.current.split(',') : []);
    const next = new Set(keys);
    lastSavedSigRef.current = sig;

    const added   = keys.filter(k => !prev.has(k));
    const removed = Array.from(prev).filter(k => !next.has(k));
    added.forEach(k => {
      const [brand, ...rest] = k.split('|'); const name = rest.join('|');
      Auth.addSavedProduct(brand, name).catch(err => console.warn('[LUMA] save product failed:', err));
    });
    removed.forEach(k => {
      const [brand, ...rest] = k.split('|'); const name = rest.join('|');
      Auth.removeSavedProduct(brand, name).catch(err => console.warn('[LUMA] unsave product failed:', err));
    });
  }, [user && user.id, saved]);

  // ---- Actions ------------------------------------------------------------
  const startScan = () => {
    setScanResults(null);
    setScanState('scanning');
    setModalOpen(true);
  };
  const handleResults = (res) => {
    setScanResults(res);
    if (res && res.tone) setTone(res.tone);
    // Persist the scan row (derived metrics only) to the user's profile.
    if (user && res) {
      const Auth = window.LumaAuth;
      if (Auth && Auth.isConfigured()) {
        const row = scanResultToRow(res);
        if (row) Auth.insertScan(row).catch(err => console.warn('[LUMA] insert scan failed:', err));
      }
    }
  };
  const finishScan = () => {
    setModalOpen(false);
    setScanState('done');
  };
  const requestSignIn = (mode) => {
    setAuthMode(mode === 'signup' ? 'signup' : 'signin');
    setAuthOpen(true);
  };
  const signOut = async () => {
    const Auth = window.LumaAuth;
    if (Auth) await Auth.signOut();
    setUser(null);
    setRoute('home');
    // Clear in-memory saved products so signed-out view doesn't leak rehydrated data.
    lastPrefsSigRef.current = '';
    lastSavedSigRef.current = '';
  };
  const navigate = (target) => {
    if (target === 'profile' && !user) { requestSignIn('signin'); return; }
    setRoute(target);
  };

  return (
    <>
      <window.LumaNav
        user={user}
        route={route}
        onNavigate={navigate}
        onRequestSignIn={requestSignIn}
        onSignOut={signOut}
      />
      {toast && (
        <div className={'luma-toast' + (toast.kind==='error' ? ' error' : '')} role="status">
          <button className="luma-toast-close" aria-label="Dismiss" onClick={()=>setToast(null)}>×</button>
          <strong>{toast.title}</strong>
          <div>{toast.body}</div>
        </div>
      )}
      {route === 'profile' && user ? (
        <window.LumaProfileView
          user={user}
          onSignOut={signOut}
          onBack={() => setRoute('home')}
          onAccountDeleted={() => {
            setUser(null);
            setRoute('home');
            setSaved(new Set());
            setPrefs([]); setConcerns([]); setCoverage(''); setBudget(300);
            setPreferredBrands([]);
            lastPrefsSigRef.current = '';
            lastSavedSigRef.current = '';
            setToast({ kind:'success', title:'Account deleted',
              body:'Your account and all associated data have been permanently removed.' });
          }}
        />
      ) : route === 'brands' ? (
        <window.LumaBrandsView
          onBack={() => setRoute('home')}
          saved={saved}
          setSaved={setSaved}
        />
      ) : (
        <div className="app">
          <aside className="left-panel">
            <window.LumaScanner scanState={scanState} tone={tone} onScan={startScan} results={scanResults}/>
            <window.LumaTonePicker tone={tone} onSelect={setTone}/>
            <window.LumaFilters
              budget={budget} setBudget={setBudget}
              prefs={prefs} setPrefs={setPrefs}
              concerns={concerns} setConcerns={setConcerns}
              coverage={coverage} setCoverage={setCoverage}
              preferredBrands={preferredBrands} setPreferredBrands={setPreferredBrands}/>
          </aside>
          <main className="right-panel">
            <window.LumaMarketplace saved={saved} setSaved={setSaved}
              budget={budget} prefs={prefs} concerns={concerns} coverage={coverage}
              preferredBrands={preferredBrands}/>
          </main>
        </div>
      )}
      <window.LumaScanModal open={modalOpen} onDone={finishScan} onResults={handleResults}/>
      {window.LumaAuthModal && (
        <window.LumaAuthModal
          open={authOpen}
          initialMode={authMode}
          onClose={() => setAuthOpen(false)}
          onAuthed={(session) => {
            if (session && session.user) setUser(session.user);
            setAuthOpen(false);
          }}
        />
      )}
    </>
  );
}
window.LumaApp = App;

})();
</script>
<script>
(function(){
  var msg = document.getElementById('boot-msg');
  var tries = 0;
  function setMsg(t){ if(msg) msg.textContent = t; }
  function showError(e){
    setMsg('Error — see console');
    var root = document.getElementById('root');
    if (root) {
      root.innerHTML = '<div style="padding:40px;color:#fff;font-family:sans-serif;max-width:720px;margin:60px auto;">'+
        '<h2 style="font-weight:300;font-size:28px;margin:0 0 12px;">LUMA couldn\'t start</h2>'+
        '<p style="opacity:.8;line-height:1.5;">'+(e && (e.message||e.toString()))+'</p>'+
        '<p style="opacity:.6;font-size:13px;margin-top:20px;">Open DevTools (F12) → Console for details.</p></div>';
    }
    console.error('[LUMA boot]', e);
  }
  function mount(){
    try {
      var R = window.React, RD = window.ReactDOM, App = window.LumaApp;
      if (!R)   { setMsg('Waiting for React…');   return retry(); }
      if (!RD)  { setMsg('Waiting for ReactDOM…'); return retry(); }
      if (!App) { setMsg('Waiting for components…'); return retry(); }
      if (!window.LumaNav || !window.LumaScanner || !window.LumaTonePicker ||
          !window.LumaFilters || !window.LumaProductCard || !window.LumaMarketplace ||
          !window.LumaScanModal || !window.LumaAuthModal || !window.LumaProfileView ||
          !window.LumaBrandsView) {
        setMsg('Waiting for components…'); return retry();
      }
      var root = RD.createRoot(document.getElementById('root'));
      root.render(R.createElement(App));
    } catch(e) { showError(e); }
  }
  function retry(){
    tries++;
    if (tries > 200) return showError(new Error('Timeout — Babel or React CDN did not load. Check network tab.'));
    setTimeout(mount, 50);
  }
  window.addEventListener('error', function(ev){ showError(ev.error || ev.message); });
  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', function(){ setTimeout(mount, 100); });
  } else {
    setTimeout(mount, 100);
  }
})();
</script>
