<!DOCTYPE html>
<html lang="en"><head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>LUMA — AI Beauty Scanner</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin>
<link rel="preconnect" href="https://unpkg.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400;1,500;1,600&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&display=swap" rel="stylesheet">
<style>/* ============================================================
   LUMA — Colors & Type
   AI face-scanning beauty matchmaker.
   Visual DNA: a horizontal gradient from a soft sky blue on the
   left to a deep midnight blue on the right. Text is warm white.
   Accent is a soft peach (the brand's "skin" warmth) to cut
   through the cool field.
   ============================================================ */

:root {
  /* ---------- Core blue field ---------- */
  --blue-50:  #e7f0ff;   /* almost-white sky tint */
  --blue-100: #c9ddff;   /* left-edge of the gradient */
  --blue-200: #9cc0ff;
  --blue-300: #6ea1f5;
  --blue-400: #4a81dc;
  --blue-500: #2f62bf;   /* brand blue */
  --blue-600: #224aa0;
  --blue-700: #17357a;
  --blue-800: #0e2358;   /* right-edge of the gradient */
  --blue-900: #07143a;   /* near-black ink */

  /* ---------- Signature gradient ---------- */
  --grad-field: linear-gradient(90deg, #c9ddff 0%, #6ea1f5 35%, #2f62bf 70%, #0e2358 100%);
  --grad-field-soft: linear-gradient(90deg, #e7f0ff 0%, #9cc0ff 40%, #4a81dc 80%, #17357a 100%);
  --grad-field-vertical: linear-gradient(180deg, #6ea1f5 0%, #0e2358 100%);
  --grad-mist: radial-gradient(ellipse at 30% 30%, rgba(255,255,255,0.18), transparent 60%);

  /* ---------- Neutrals / foreground ---------- */
  --fg:        #ffffff;
  --fg-1:      #ffffff;            /* primary text */
  --fg-2:      rgba(255,255,255,0.78); /* secondary */
  --fg-3:      rgba(255,255,255,0.55); /* tertiary / caption */
  --fg-dim:    rgba(255,255,255,0.35);
  --fg-ink:    #07143a;            /* dark text on light chips */

  --line:      rgba(255,255,255,0.18);
  --line-soft: rgba(255,255,255,0.10);
  --line-strong: rgba(255,255,255,0.35);

  /* ---------- Surfaces (translucent over gradient) ---------- */
  --surface-1: rgba(255,255,255,0.06);   /* default card */
  --surface-2: rgba(255,255,255,0.10);   /* hover card / raised */
  --surface-3: rgba(255,255,255,0.14);   /* active */
  --surface-ink: rgba(7,20,58,0.45);     /* dark wash for legibility */
  --surface-glass: rgba(255,255,255,0.08); /* glassmorphism */
  --blur-glass: saturate(140%) blur(24px);

  /* ---------- Accents ---------- */
  --peach:     #ffc9a8;   /* warm brand accent — opposite of blue */
  --peach-ink: #7a3a1a;
  --rose:      #ffb0c0;
  --mint:      #9ef0c9;   /* success / match */
  --amber:     #ffd98a;   /* warning / highlight */
  --coral:     #ff8a7a;   /* error / strong accent */

  /* ---------- Semantic ---------- */
  --color-bg:        var(--grad-field);
  --color-fg:        var(--fg-1);
  --color-muted:     var(--fg-2);
  --color-border:    var(--line);
  --color-accent:    var(--peach);
  --color-success:   var(--mint);
  --color-warning:   var(--amber);
  --color-danger:    var(--coral);
  --color-link:      var(--peach);
  --color-match:     var(--mint);

  /* ---------- Type families ---------- */
  --font-display: "Cormorant Garamond", "Didot", "Playfair Display", Georgia, serif;
  --font-body:    "DM Sans", ui-sans-serif, system-ui, -apple-system, "Segoe UI", Helvetica, Arial, sans-serif;
  --font-mono:    ui-monospace, "SF Mono", "JetBrains Mono", Menlo, Consolas, monospace;

  /* ---------- Type scale (fluid) ---------- */
  --fs-micro:   10px;
  --fs-xxs:     11px;
  --fs-xs:      12px;
  --fs-sm:      13px;
  --fs-md:      15px;
  --fs-lg:      18px;
  --fs-xl:      22px;
  --fs-2xl:     28px;
  --fs-3xl:     36px;
  --fs-4xl:     48px;
  --fs-5xl:     64px;
  --fs-display: 88px;

  /* ---------- Weights ---------- */
  --fw-light:   300;
  --fw-regular: 400;
  --fw-medium:  500;
  --fw-semi:    600;

  /* ---------- Tracking ---------- */
  --tracking-eyebrow: 0.28em;   /* uppercase labels */
  --tracking-nav:     0.18em;
  --tracking-caps:    0.12em;
  --tracking-body:    0;
  --tracking-display: -0.02em;  /* tighten display serif */

  /* ---------- Line heights ---------- */
  --lh-tight: 1.05;
  --lh-snug:  1.2;
  --lh-body:  1.55;
  --lh-loose: 1.75;

  /* ---------- Radii ---------- */
  --radius-xs: 2px;
  --radius-sm: 4px;
  --radius-md: 8px;
  --radius-lg: 16px;
  --radius-xl: 24px;
  --radius-pill: 999px;
  --radius-circle: 50%;

  /* ---------- Spacing ---------- */
  --sp-0: 0;
  --sp-1: 4px;
  --sp-2: 8px;
  --sp-3: 12px;
  --sp-4: 16px;
  --sp-5: 20px;
  --sp-6: 24px;
  --sp-7: 32px;
  --sp-8: 40px;
  --sp-9: 56px;
  --sp-10: 72px;
  --sp-11: 96px;

  /* ---------- Shadows (tuned for dark blue field) ---------- */
  --shadow-1: 0 1px 2px rgba(7,20,58,0.25);
  --shadow-2: 0 4px 14px rgba(7,20,58,0.30);
  --shadow-3: 0 12px 40px rgba(7,20,58,0.45);
  --shadow-glow: 0 0 24px rgba(201,221,255,0.25);
  --shadow-peach-glow: 0 0 22px rgba(255,201,168,0.35);
  --shadow-inset-hi: inset 0 1px 0 rgba(255,255,255,0.18);
  --shadow-inset-lo: inset 0 -1px 0 rgba(7,20,58,0.35);

  /* ---------- Motion ---------- */
  --ease-out:     cubic-bezier(0.22, 1, 0.36, 1);
  --ease-in-out:  cubic-bezier(0.65, 0, 0.35, 1);
  --ease-spring:  cubic-bezier(0.34, 1.56, 0.64, 1);
  --dur-fast:     140ms;
  --dur-base:     240ms;
  --dur-slow:     400ms;
  --dur-stage:    700ms;
}

/* ============================================================
   BASE RESETS
   ============================================================ */
*, *::before, *::after { box-sizing: border-box; }
html, body { margin: 0; padding: 0; }
body {
  font-family: var(--font-body);
  font-weight: var(--fw-light);
  font-size: var(--fs-md);
  line-height: var(--lh-body);
  color: var(--fg-1);
  background: var(--grad-field);
  background-attachment: fixed;
  -webkit-font-smoothing: antialiased;
  text-rendering: optimizeLegibility;
}

/* ============================================================
   SEMANTIC TYPE ELEMENTS
   Use these classes or rawtags — both map to the same tokens.
   ============================================================ */

.eyebrow, .luma-eyebrow {
  font-family: var(--font-body);
  font-size: var(--fs-micro);
  font-weight: var(--fw-medium);
  text-transform: uppercase;
  letter-spacing: var(--tracking-eyebrow);
  color: var(--fg-2);
}

h1, .h1, .display {
  font-family: var(--font-display);
  font-weight: var(--fw-light);
  font-size: clamp(44px, 6vw, var(--fs-display));
  line-height: var(--lh-tight);
  letter-spacing: var(--tracking-display);
  color: var(--fg-1);
  margin: 0;
}
h1 em, .display em, .h1 em {
  font-style: italic;
  font-weight: var(--fw-regular);
  color: var(--peach);
}

h2, .h2 {
  font-family: var(--font-display);
  font-weight: var(--fw-light);
  font-size: clamp(32px, 4vw, var(--fs-3xl));
  line-height: var(--lh-snug);
  letter-spacing: var(--tracking-display);
  color: var(--fg-1);
  margin: 0;
}

h3, .h3 {
  font-family: var(--font-display);
  font-weight: var(--fw-regular);
  font-size: var(--fs-2xl);
  line-height: var(--lh-snug);
  color: var(--fg-1);
  margin: 0;
}

h4, .h4 {
  font-family: var(--font-body);
  font-weight: var(--fw-medium);
  font-size: var(--fs-lg);
  line-height: var(--lh-snug);
  letter-spacing: 0;
  color: var(--fg-1);
  margin: 0;
}

h5, .h5, .overline {
  font-family: var(--font-body);
  font-weight: var(--fw-medium);
  font-size: var(--fs-xs);
  text-transform: uppercase;
  letter-spacing: var(--tracking-caps);
  color: var(--fg-2);
  margin: 0;
}

p, .body {
  font-family: var(--font-body);
  font-weight: var(--fw-light);
  font-size: var(--fs-md);
  line-height: var(--lh-body);
  color: var(--fg-1);
  text-wrap: pretty;
  margin: 0;
}

.lede {
  font-family: var(--font-body);
  font-weight: var(--fw-light);
  font-size: var(--fs-lg);
  line-height: var(--lh-body);
  color: var(--fg-2);
}

.caption, small {
  font-family: var(--font-body);
  font-size: var(--fs-xs);
  color: var(--fg-3);
  line-height: var(--lh-body);
}

.numeric, .price {
  font-family: var(--font-display);
  font-weight: var(--fw-light);
  font-feature-settings: "lnum" 1, "tnum" 1;
}

code, pre, .mono {
  font-family: var(--font-mono);
  font-size: var(--fs-xs);
}

a {
  color: var(--color-link);
  text-decoration: none;
  border-bottom: 1px solid currentColor;
  transition: opacity var(--dur-fast) var(--ease-out);
}
a:hover { opacity: 0.7; }

/* ============================================================
   UTILITY HELPERS
   ============================================================ */

.u-field { background: var(--grad-field); }
.u-field-soft { background: var(--grad-field-soft); }
.u-field-v { background: var(--grad-field-vertical); }
.u-glass {
  background: var(--surface-glass);
  backdrop-filter: var(--blur-glass);
  -webkit-backdrop-filter: var(--blur-glass);
  border: 1px solid var(--line);
}
.u-serif  { font-family: var(--font-display); }
.u-sans   { font-family: var(--font-body); }
.u-italic { font-style: italic; }
.u-peach  { color: var(--peach); }
.u-mint   { color: var(--mint); }

/* Divider with center light */
.u-divider {
  height: 1px;
  background: linear-gradient(90deg, transparent, var(--line-strong), transparent);
}
</style>
<style>
  :root{
    --panel-bg: rgba(255,255,255,0.05);
    --line: rgba(255,255,255,0.16);
    --line-soft: rgba(255,255,255,0.10);
    --line-strong: rgba(255,255,255,0.28);
    --surface-1: rgba(255,255,255,0.06);
    --surface-2: rgba(255,255,255,0.12);
    --peach: #ffc9a8;
    --mint: #9ef0c9;
    --ink: #07143a;
  }
  html,body{margin:0;padding:0;min-height:100vh;max-width:100%;overflow-x:hidden}
  body{
    background:linear-gradient(90deg,#90d5ff 0%,#5aa8e8 35%,#1e4db8 70%,#00008B 100%);
    background-attachment:fixed;
    color:#fff;
    font-family:var(--font-body);
    font-weight:300;
    -webkit-font-smoothing:antialiased;
  }
  body::before{
    content:'';position:fixed;inset:0;z-index:0;pointer-events:none;opacity:0.4;
    background-image:url("data:image/svg+xml;base64,PHN2ZyB2aWV3Qm94PScwIDAgMjU2IDI1NicgeG1sbnM9J2h0dHA6Ly93d3cudzMub3JnLzIwMDAvc3ZnJz48ZmlsdGVyIGlkPSduJz48ZmVUdXJidWxlbmNlIHR5cGU9J2ZyYWN0YWxOb2lzZScgYmFzZUZyZXF1ZW5jeT0nMC45JyBudW1PY3RhdmVzPSczJyBzdGl0Y2hUaWxlcz0nc3RpdGNoJy8+PC9maWx0ZXI+PHJlY3Qgd2lkdGg9JzEwMCUnIGhlaWdodD0nMTAwJScgZmlsdGVyPSd1cmwoI24pJyBvcGFjaXR5PScwLjA1Jy8+PC9zdmc+");
  }
  *,*::before,*::after{box-sizing:border-box}

  /* ===== NAV ===== */
  .luma-nav{
    position:fixed;top:0;left:0;right:0;z-index:200;
    display:flex;align-items:center;justify-content:space-between;
    padding:20px 48px;
    background:rgba(7,20,58,0.35);
    backdrop-filter:saturate(140%) blur(20px);
    -webkit-backdrop-filter:saturate(140%) blur(20px);
    border-bottom:1px solid var(--line);
  }
  .luma-logo{
    font-family:var(--font-display);font-weight:300;font-size:26px;
    letter-spacing:0.32em;color:#fff;text-decoration:none;border:none;
  }
  .luma-logo span{color:#fff;font-style:italic}
  .luma-nav-links{display:flex;gap:32px;list-style:none;margin:0;padding:0}
  .luma-nav-links a{
    font-size:11px;letter-spacing:0.18em;text-transform:uppercase;
    color:rgba(255,255,255,0.75);text-decoration:none;font-weight:400;
    border:none;transition:color .2s;
  }
  .luma-nav-links a:hover{color:var(--peach);opacity:1}
  .luma-badge{
    background:var(--peach);color:var(--ink);
    font-size:9px;letter-spacing:0.22em;text-transform:uppercase;
    padding:5px 12px;font-weight:600;border-radius:999px;
  }

  /* ===== LAYOUT ===== */
  .app{
    display:grid;grid-template-columns:minmax(0,400px) minmax(0,1fr);
    min-height:100vh;padding-top:68px;position:relative;z-index:1;
    width:100%;max-width:100vw;
  }
  .left-panel{
    background:rgba(7,20,58,0.22);
    backdrop-filter:blur(14px);
    -webkit-backdrop-filter:blur(14px);
    border-right:1px solid var(--line);
  }
  .right-panel{padding:0}

  /* ===== SECTIONS ===== */
  .scan-area,.tone-wrap,.filters-wrap{
    padding:28px 32px 24px;border-bottom:1px solid var(--line);
  }
  .section-eyebrow{
    font-size:9px;letter-spacing:0.3em;text-transform:uppercase;
    color:var(--peach);margin-bottom:16px;font-weight:500;
    display:flex;align-items:center;gap:10px;
  }
  .section-eyebrow::before{content:'';width:22px;height:1px;background:var(--peach)}
  .status-dot{
    width:6px;height:6px;border-radius:50%;background:var(--mint);
    display:inline-block;animation:pulse 2s infinite;margin-left:auto;
  }
  @keyframes pulse{0%,100%{opacity:1;box-shadow:0 0 0 0 rgba(158,240,201,.5)}50%{box-shadow:0 0 0 6px transparent}}

  /* ===== SCAN VIEWPORT ===== */
  .scan-viewport{
    width:100%;aspect-ratio:3/4;
    background:rgba(7,20,58,0.4);
    border:1px solid var(--line);border-radius:6px;
    position:relative;overflow:hidden;
  }
  .scan-dots{
    position:absolute;inset:0;
    background-image:radial-gradient(circle,rgba(255,255,255,.12) 1px,transparent 1px);
    background-size:18px 18px;
  }
  .face-svg{
    position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);
    width:62%;height:auto;filter:drop-shadow(0 8px 28px rgba(7,20,58,.45));
  }
  .face-mesh{
    position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);
    width:62%;height:auto;pointer-events:none;
    animation:fadeIn .5s ease;
  }
  @keyframes fadeIn{from{opacity:0}to{opacity:1}}
  .face-guide{
    position:absolute;left:50%;top:44%;transform:translate(-50%,-50%);
    width:58%;height:58%;
    border:1.5px dashed rgba(255,201,168,0.55);
    border-radius:50%;pointer-events:none;
  }
  .face-guide.pulse{animation:guidePulse 1.2s ease-in-out infinite}
  @keyframes guidePulse{0%,100%{border-color:rgba(255,201,168,.35)}50%{border-color:rgba(255,201,168,.9)}}
  .scan-corner{position:absolute;width:18px;height:18px}
  .scan-corner.tl{top:12px;left:12px;border-top:1.5px solid var(--peach);border-left:1.5px solid var(--peach)}
  .scan-corner.tr{top:12px;right:12px;border-top:1.5px solid var(--peach);border-right:1.5px solid var(--peach)}
  .scan-corner.bl{bottom:12px;left:12px;border-bottom:1.5px solid var(--peach);border-left:1.5px solid var(--peach)}
  .scan-corner.br{bottom:12px;right:12px;border-bottom:1.5px solid var(--peach);border-right:1.5px solid var(--peach)}
  .scanline{
    position:absolute;left:0;right:0;height:2px;
    background:linear-gradient(to right,transparent,rgba(255,201,168,.85),transparent);
    animation:sl 2.4s ease-in-out infinite;
  }
  @keyframes sl{0%{top:2%;opacity:0}10%{opacity:1}90%{opacity:1}100%{top:98%;opacity:0}}
  .scan-status{
    position:absolute;bottom:12px;left:50%;transform:translateX(-50%);
    font-size:9px;letter-spacing:0.22em;text-transform:uppercase;
    color:var(--peach);background:rgba(7,20,58,0.7);padding:4px 12px;
    border:1px solid rgba(255,201,168,.28);border-radius:999px;white-space:nowrap;
  }

  /* ===== ANALYSIS CHIPS ===== */
  .chips-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:14px}
  .chip{
    background:var(--surface-1);border:1px solid var(--line);
    padding:10px 12px;border-radius:4px;position:relative;
  }
  .chip-lbl{font-size:9px;letter-spacing:0.18em;text-transform:uppercase;color:rgba(255,255,255,.6);margin-bottom:4px}
  .chip-val{font-size:14px;font-weight:400;color:#fff}
  .chip-sub{font-size:11px;color:rgba(255,255,255,.55);margin-top:2px}

  /* ===== SCAN BUTTON ===== */
  .scan-btn{
    width:100%;padding:14px;margin-top:20px;
    background:var(--peach);color:var(--ink);border:none;cursor:pointer;
    font-family:var(--font-body);font-size:11px;letter-spacing:0.28em;
    text-transform:uppercase;font-weight:600;border-radius:2px;
    transition:.2s;position:relative;overflow:hidden;
  }
  .scan-btn:hover:not(:disabled){box-shadow:0 0 24px rgba(255,201,168,.55);transform:translateY(-1px)}
  .scan-btn:active{transform:translateY(0) scale(.99)}
  .scan-btn:disabled{background:rgba(255,255,255,.08);color:var(--peach);cursor:default;border:1px solid var(--peach)}

  /* ===== TONE PICKER ===== */
  .tone-group-label{
    font-size:10px;letter-spacing:0.14em;text-transform:uppercase;
    color:rgba(255,255,255,.6);margin:12px 0 8px;font-weight:400;
  }
  .tone-row{display:flex;flex-wrap:wrap;gap:7px}
  .tone-sw{
    width:32px;height:32px;border-radius:50%;cursor:pointer;
    border:2px solid transparent;padding:0;
    transition:.2s;box-shadow:0 2px 6px rgba(7,20,58,.5);
  }
  .tone-sw:hover{transform:scale(1.12)}
  .tone-sw.active{border-color:var(--peach);box-shadow:0 0 0 3px rgba(255,201,168,.25),0 2px 6px rgba(7,20,58,.5)}
  .selected-tone{
    display:flex;align-items:center;gap:12px;margin-top:16px;
    padding:12px;background:var(--surface-1);border:1px solid var(--line);
    border-radius:4px;
  }
  .selected-dot{width:34px;height:34px;border-radius:50%;flex-shrink:0;border:1px solid rgba(255,255,255,.2)}
  .selected-name{font-size:15px;font-weight:400;color:#fff}
  .selected-sub{font-size:11px;color:rgba(255,255,255,.6);margin-top:2px}

  /* ===== FILTERS ===== */
  .filter-group{margin-bottom:22px}
  .filter-group:last-child{margin-bottom:0}
  .filter-title{font-size:13px;font-weight:400;color:#fff;margin-bottom:12px}
  .budget-labels{display:flex;justify-content:space-between;font-size:10px;color:rgba(255,255,255,.55);margin-bottom:8px;letter-spacing:.08em}
  input[type=range]{
    -webkit-appearance:none;width:100%;height:2px;
    background:linear-gradient(to right,var(--peach) 0%,var(--peach) var(--val,40%),rgba(255,255,255,.15) var(--val,40%),rgba(255,255,255,.15) 100%);
    outline:none;cursor:pointer;border-radius:1px;
  }
  input[type=range]::-webkit-slider-thumb{
    -webkit-appearance:none;width:16px;height:16px;border-radius:50%;
    background:var(--peach);border:2px solid var(--ink);
    box-shadow:0 0 0 2px rgba(255,201,168,.3);cursor:pointer;
  }
  .budget-val{font-size:11px;color:var(--peach);text-align:right;margin-top:8px;letter-spacing:.06em}

  .toggle-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
  .toggle{
    display:flex;align-items:center;gap:10px;padding:10px 12px;
    background:var(--surface-1);border:1px solid var(--line);
    cursor:pointer;font-size:12px;color:#fff;font-family:inherit;
    border-radius:4px;transition:.2s;text-align:left;
  }
  .toggle:hover{border-color:rgba(255,201,168,.4)}
  .toggle.on{border-color:var(--peach);background:rgba(255,201,168,.1)}
  .toggle-dot{
    width:14px;height:14px;border-radius:50%;border:1px solid rgba(255,255,255,.3);
    flex-shrink:0;display:inline-flex;align-items:center;justify-content:center;transition:.2s;
  }
  .toggle.on .toggle-dot{background:var(--peach);border-color:var(--peach)}
  .toggle.on .toggle-dot::after{content:'';width:4px;height:4px;border-radius:50%;background:var(--ink)}

  .tag-row{display:flex;flex-wrap:wrap;gap:6px}
  .tag{
    padding:6px 14px;border:1px solid var(--line);background:transparent;
    color:rgba(255,255,255,.8);cursor:pointer;font-family:inherit;
    font-size:11px;letter-spacing:0.08em;text-transform:uppercase;
    border-radius:999px;transition:.2s;
  }
  .tag:hover{border-color:rgba(255,201,168,.4);color:#fff}
  .tag.active{border-color:var(--peach);color:var(--peach);background:rgba(255,201,168,.12)}

  /* ===== MARKETPLACE ===== */
  .mkt-header{
    padding:30px 40px 0;border-bottom:1px solid var(--line);
    position:sticky;top:68px;z-index:100;
    background:rgba(7,20,58,0.35);
    backdrop-filter:saturate(140%) blur(20px);
    -webkit-backdrop-filter:saturate(140%) blur(20px);
  }
  .mkt-top{display:flex;align-items:flex-end;justify-content:space-between;margin-bottom:22px}
  .mkt-title{
    font-family:var(--font-display);font-size:40px;font-weight:300;
    line-height:1;color:#fff;margin:0;letter-spacing:-0.02em;
  }
  .mkt-title em{font-style:italic;color:var(--peach);font-weight:400}
  .mkt-sub{font-size:12px;color:rgba(255,255,255,.65);margin-top:4px}
  .mkt-meta{text-align:right}
  .mkt-count{font-size:11px;color:rgba(255,255,255,.75);letter-spacing:.06em}

  .cat-tabs{display:flex;gap:0;overflow-x:auto;scrollbar-width:none}
  .cat-tabs::-webkit-scrollbar{display:none}
  .cat-tab{
    padding:14px 22px;border:none;background:transparent;
    color:rgba(255,255,255,.6);cursor:pointer;font-family:inherit;
    font-size:11px;letter-spacing:0.16em;text-transform:uppercase;font-weight:400;
    border-bottom:2px solid transparent;white-space:nowrap;transition:.2s;
  }
  .cat-tab.active{color:var(--peach);border-bottom-color:var(--peach)}
  .cat-tab:hover:not(.active){color:#fff}

  .sort-bar{
    display:flex;align-items:center;justify-content:space-between;
    padding:16px 40px;border-bottom:1px solid var(--line);
  }
  .sort-left{display:flex;align-items:center;gap:10px}
  .sort-label{font-size:10px;letter-spacing:0.18em;text-transform:uppercase;color:rgba(255,255,255,.55)}
  .sort-btn{
    padding:6px 14px;border:1px solid var(--line);background:transparent;
    color:rgba(255,255,255,.7);cursor:pointer;font-family:inherit;
    font-size:10px;letter-spacing:0.14em;text-transform:uppercase;
    border-radius:999px;transition:.2s;
  }
  .sort-btn:hover{border-color:rgba(255,201,168,.4);color:#fff}
  .sort-btn.on{border-color:var(--peach);color:var(--peach);background:rgba(255,201,168,.12)}
  .sort-count{font-size:11px;color:rgba(255,255,255,.6)}
  .sort-count em{color:var(--peach);font-style:normal}

  /* ===== PRODUCT GRID ===== */
  .prod-grid{
    display:grid;grid-template-columns:repeat(auto-fill,minmax(min(270px,100%),1fr));
    gap:1px;background:var(--line-soft);border-top:1px solid var(--line-soft);
  }
  .prod-card{
    background:rgba(7,20,58,0.15);
    backdrop-filter:blur(4px);
    -webkit-backdrop-filter:blur(4px);
    padding:24px;position:relative;transition:.2s;cursor:pointer;
    animation:fadeUp .4s ease both;
    display:flex;flex-direction:column;
  }
  .prod-card:hover{background:rgba(255,255,255,.06)}
  @keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
  .match-badge{
    position:absolute;top:16px;right:16px;z-index:2;
    background:var(--mint);color:var(--ink);
    font-size:9px;letter-spacing:0.18em;text-transform:uppercase;
    padding:4px 10px;font-weight:600;border-radius:999px;
  }
  .prod-img{
    width:100%;height:150px;border-radius:4px;margin-bottom:18px;
    position:relative;overflow:hidden;
    border:1px solid var(--line-soft);
  }
  .prod-img-bottle{
    position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);
    width:36px;height:72px;border-radius:6px 6px 18px 18px;
    background:linear-gradient(180deg,rgba(7,20,58,.35),rgba(7,20,58,.55));
    border:1px solid rgba(255,255,255,.25);
    box-shadow:inset 0 1px 0 rgba(255,255,255,.3);
  }
  .prod-img-bottle::before{
    content:'';position:absolute;top:-8px;left:50%;transform:translateX(-50%);
    width:16px;height:10px;background:rgba(7,20,58,.7);border-radius:2px;
    border:1px solid rgba(255,255,255,.2);
  }
  .prod-brand{font-size:10px;letter-spacing:0.22em;text-transform:uppercase;color:rgba(255,255,255,.7);margin-bottom:6px}
  .prod-cat{
    display:inline-block;font-size:9px;letter-spacing:0.14em;text-transform:uppercase;
    color:rgba(255,255,255,.6);border:1px solid var(--line);padding:3px 9px;
    border-radius:999px;margin-bottom:12px;
  }
  .prod-name{font-family:var(--font-display);font-size:22px;font-weight:400;line-height:1.1;margin:0 0 8px;color:#fff}
  .prod-desc{font-size:12px;color:rgba(255,255,255,.7);line-height:1.55;margin:0 0 14px;font-weight:300}
  .prod-swatches{display:flex;gap:6px;margin-bottom:12px;align-items:center;flex-wrap:wrap}
  .prod-sw{width:16px;height:16px;border-radius:50%;border:1px solid rgba(255,255,255,.2);display:inline-block}
  .prod-more{font-size:10px;color:rgba(255,255,255,.55);margin-left:4px}
  .prod-tags{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:14px}
  .prod-tag{
    font-size:9px;letter-spacing:0.1em;text-transform:uppercase;
    padding:3px 8px;border:1px solid var(--line);color:rgba(255,255,255,.65);border-radius:999px;
  }
  .prod-foot{
    display:flex;align-items:center;justify-content:space-between;
    margin-top:auto;padding-top:14px;border-top:1px solid var(--line-soft);
  }
  .prod-price{font-family:var(--font-display);font-size:22px;font-weight:300;color:#fff}
  .prod-actions{display:flex;gap:8px}
  .prod-save{
    width:34px;height:34px;border:1px solid var(--line);background:transparent;
    cursor:pointer;display:flex;align-items:center;justify-content:center;
    color:rgba(255,255,255,.7);transition:.2s;border-radius:999px;
  }
  .prod-save:hover,.prod-save.saved{border-color:var(--peach);color:var(--peach)}
  .prod-shop{
    display:inline-block;text-align:center;text-decoration:none;
    padding:8px 18px;background:var(--peach);color:var(--ink);
    border:none;cursor:pointer;font-family:inherit;
    font-size:9px;letter-spacing:0.2em;text-transform:uppercase;font-weight:600;
    border-radius:2px;transition:.2s;
  }
  .prod-shop:hover{box-shadow:0 0 16px rgba(255,201,168,.5);color:var(--ink)}
  .prod-shop:visited{color:var(--ink)}

  /* ===== MODAL ===== */
  .scan-modal{
    position:fixed;inset:0;z-index:300;
    background:rgba(7,20,58,0.82);
    backdrop-filter:blur(8px);
    display:flex;align-items:center;justify-content:center;
    animation:fadeIn .3s ease;
  }
  .scan-modal-inner{
    padding:48px;text-align:center;
    background:rgba(7,20,58,0.75);
    backdrop-filter:saturate(140%) blur(30px);
    border:1px solid var(--line-strong);
    border-radius:16px;max-width:360px;width:90%;
    box-shadow:0 40px 80px rgba(7,20,58,.6), 0 0 60px rgba(201,221,255,.15);
  }
  .ring-wrap{
    width:90px;height:90px;margin:0 auto 20px;position:relative;
  }
  .ring-wrap svg{width:100%;height:100%}
  .ring-pct{
    position:absolute;inset:0;display:flex;align-items:center;justify-content:center;
    font-family:var(--font-display);font-size:30px;font-weight:300;color:#fff;
  }
  .ring-pct span{font-size:14px;color:var(--peach);margin-left:2px}
  .modal-title{font-family:var(--font-display);font-size:26px;font-weight:300;margin:0 0 6px;color:#fff}
  .modal-sub{font-size:11px;color:rgba(255,255,255,.65);letter-spacing:0.1em;margin:0}
  .modal-steps{margin-top:24px;text-align:left}
  .modal-step{
    display:flex;align-items:center;gap:10px;padding:8px 0;
    border-bottom:1px solid var(--line-soft);font-size:11px;
    color:rgba(255,255,255,.65);
  }
  .modal-step:last-child{border-bottom:none}
  .step-ico{
    width:18px;height:18px;border-radius:50%;
    border:1px solid var(--line);display:inline-flex;align-items:center;justify-content:center;
    font-size:9px;flex-shrink:0;transition:.2s;
  }
  .step-ico.done{background:var(--peach);border-color:var(--peach);color:var(--ink)}
  .step-ico.active{border-color:var(--peach);color:var(--peach)}

  /* ===== NAV HAMBURGER (Desktop: hidden) ===== */
  .nav-hamburger{
    display:none;background:transparent;border:1px solid var(--line);
    width:38px;height:38px;border-radius:6px;
    align-items:center;justify-content:center;
    color:#fff;cursor:pointer;padding:0;
  }
  .nav-hamburger:hover{background:rgba(255,255,255,.06);border-color:var(--peach)}
  .nav-hamburger svg{width:18px;height:18px;stroke:currentColor;stroke-width:2;fill:none;stroke-linecap:round}

  /* ===== RESPONSIVE: TABLET & SMALL DESKTOP ===== */
  @media (max-width: 960px){
    .luma-nav{padding:14px 24px}
    .luma-logo{font-size:22px;letter-spacing:0.26em}
    .luma-nav-links{gap:20px}
    .luma-nav-links a{font-size:10px}
    .luma-badge{padding:4px 10px;font-size:8px}

    .app{grid-template-columns:1fr;padding-top:62px}
    .left-panel{
      position:static;height:auto;
      border-right:none;border-bottom:1px solid var(--line);
      max-height:none;
    }
    .right-panel{padding:0}
    .scan-area,.tone-wrap,.filters-wrap{padding:22px 22px 20px}
    .scan-viewport{max-width:360px;margin:0 auto}
    .mkt-header{padding:26px 24px 0;position:static}
    .sort-bar{padding:14px 24px}
    .mkt-title{font-size:32px}
  }

  /* ===== RESPONSIVE: PHONE & SMALL TABLET ===== */
  @media (max-width: 768px){
    .luma-nav{padding:12px 16px}
    .luma-logo{font-size:20px;letter-spacing:0.22em}
    .luma-badge{display:none}

    .nav-hamburger{display:inline-flex}

    .luma-nav-links{
      position:fixed;top:60px;left:0;right:0;
      flex-direction:column;align-items:flex-start;
      background:rgba(7,20,58,0.96);
      backdrop-filter:saturate(160%) blur(24px);
      -webkit-backdrop-filter:saturate(160%) blur(24px);
      border-bottom:1px solid var(--line);
      padding:18px 20px;gap:4px;
      transform:translateY(-120%);
      transition:transform .26s ease;
      z-index:198;
      pointer-events:none;
    }
    .luma-nav-links.open{transform:translateY(0);pointer-events:auto}
    .luma-nav-links li{width:100%;border-bottom:1px solid var(--line-soft)}
    .luma-nav-links li:last-child{border-bottom:none}
    .luma-nav-links a{font-size:13px;letter-spacing:0.2em;padding:12px 0;display:block;width:100%}

    .app{padding-top:58px}
    .scan-area,.tone-wrap,.filters-wrap{padding:18px 16px}
    .scan-viewport{max-width:300px;aspect-ratio:4/5}
    .scan-btn{padding:14px 0;font-size:11px}
    .chips-grid{grid-template-columns:1fr 1fr;gap:6px}
    .chip{padding:9px 10px}

    /* Product grid -> 2 columns on phone */
    .prod-grid{grid-template-columns:repeat(2,1fr)}
    .prod-card{padding:14px}
    .prod-img{height:110px;margin-bottom:12px}
    .prod-name{font-size:14px}
    .prod-brand{font-size:9px}
    .match-badge{top:10px;right:10px;font-size:8px;padding:3px 8px}

    /* Marketplace heading + sort bar */
    .mkt-header{padding:22px 18px 0;top:58px}
    .mkt-top{flex-direction:column;align-items:flex-start;gap:10px;margin-bottom:16px}
    .mkt-title{font-size:28px}
    .mkt-meta{text-align:left}
    .sort-bar{padding:14px 18px;flex-direction:column;align-items:flex-start;gap:10px}
    .sort-left{flex-wrap:wrap}
    .sort-count{font-size:10px}
    .cat-tab{padding:12px 14px;font-size:10px}

    /* Scan modal */
    .modal-card{max-width:100%;width:calc(100vw - 24px);padding:32px 20px}
    .modal-title{font-size:22px}
    .ring-wrap{width:76px;height:76px}
    .ring-pct{font-size:26px}
  }

  /* ===== VERY SMALL PHONES ===== */
  @media (max-width: 480px){
    .prod-grid{grid-template-columns:1fr}
    .prod-card{padding:18px}
    .prod-img{height:140px}
  }


  /* ===== MOBILE OVERFLOW FIX =====
     Defensive rules: ensure no child forces the document wider than the
     viewport, even if an inner element has long unbreakable content. */
  .app,.left-panel,.right-panel,.marketplace,.mkt-header,.sort-bar,.prod-grid,.prod-card,
  .scan-area,.tone-wrap,.filters-wrap,.luma-nav{
    min-width:0;max-width:100%;
  }
  .scan-viewport{max-width:100%}
  .prod-card,.prod-name,.prod-desc,.prod-brand,.mkt-title,.filter-title,.selected-name{
    min-width:0;overflow-wrap:anywhere;word-break:break-word;
  }
  @media (max-width: 768px){
    /* Make sure the app grid is actually a single column at this width, and
       fix the sticky marketplace header so it can't create a horizontal bar. */
    .app{grid-template-columns:1fr}
    .mkt-header{position:static;top:auto}
    /* Extra guard against horizontal overflow from any inner element */
    body,#root,.app{overflow-x:clip}
  }

  /* ===== BIOMETRIC SCANNER HUD ===== */
  .bio-overlay{
    position:absolute;inset:0;pointer-events:none;
    transform:scaleX(-1); /* mirror to match flipped video */
    transform-origin:center;
  }
  .bio-guide{
    position:absolute;inset:0;pointer-events:none;
    width:100%;height:100%;
  }
  .bio-guide ellipse.ring-bg{
    fill:none;stroke:rgba(255,255,255,.16);stroke-width:1.5;
    stroke-dasharray:4 6;
  }
  .bio-guide ellipse.ring-fg{
    fill:none;stroke:var(--peach);stroke-width:2.2;
    stroke-linecap:round;
    transition:stroke-dashoffset .25s ease, stroke .25s ease;
    filter:drop-shadow(0 0 6px rgba(255,201,168,.55));
  }
  .bio-guide ellipse.ring-fg.ok{stroke:var(--mint);filter:drop-shadow(0 0 8px rgba(158,240,201,.75))}
  .bio-guide ellipse.ring-fg.warn{stroke:#ffb38a;filter:drop-shadow(0 0 8px rgba(255,179,138,.55))}
  .bio-guide ellipse.ring-fg.bad{stroke:#ff7a90;filter:drop-shadow(0 0 8px rgba(255,122,144,.6))}
  .bio-guide .guide-tick{stroke:rgba(255,255,255,.35);stroke-width:1.3}
  .bio-guide .guide-tick.on{stroke:var(--mint);stroke-width:2}

  .bio-prompt{
    position:absolute;left:50%;top:16px;transform:translateX(-50%);
    background:rgba(7,20,58,.78);
    border:1px solid rgba(255,201,168,.45);
    color:#fff;padding:8px 16px;border-radius:999px;
    font-size:11px;letter-spacing:.18em;text-transform:uppercase;
    display:flex;align-items:center;gap:10px;white-space:nowrap;
    backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);
    box-shadow:0 8px 22px rgba(7,20,58,.5);
    animation:promptIn .25s ease;
  }
  @keyframes promptIn{from{opacity:0;transform:translate(-50%,-8px)}to{opacity:1;transform:translate(-50%,0)}}
  .bio-prompt.ok{border-color:rgba(158,240,201,.55)}
  .bio-prompt .bio-arrow{font-size:14px;color:var(--peach)}
  .bio-prompt .bio-arrow.ok{color:var(--mint)}

  .bio-steps{
    position:absolute;top:54px;left:50%;transform:translateX(-50%);
    display:flex;gap:6px;
  }
  .bio-step-pill{
    font-size:8px;letter-spacing:.22em;text-transform:uppercase;
    padding:3px 9px;border-radius:999px;
    background:rgba(7,20,58,.55);
    border:1px solid rgba(255,255,255,.14);
    color:rgba(255,255,255,.55);
  }
  .bio-step-pill.active{border-color:var(--peach);color:var(--peach)}
  .bio-step-pill.done{border-color:var(--mint);color:var(--mint);background:rgba(158,240,201,.12)}

  .bio-metrics{
    position:absolute;left:10px;bottom:10px;right:10px;
    display:grid;grid-template-columns:repeat(4,1fr);gap:6px;
    pointer-events:none;
  }
  .bio-metric{
    background:rgba(7,20,58,.72);
    border:1px solid rgba(255,255,255,.1);
    border-radius:6px;padding:6px 8px;
    backdrop-filter:blur(6px);-webkit-backdrop-filter:blur(6px);
  }
  .bio-metric-lbl{
    font-size:7.5px;letter-spacing:.18em;text-transform:uppercase;
    color:rgba(255,255,255,.55);margin-bottom:2px;
  }
  .bio-metric-val{font-size:11px;color:#fff;font-weight:500;letter-spacing:.03em}
  .bio-metric.ok{border-color:rgba(158,240,201,.45)}
  .bio-metric.ok .bio-metric-val{color:var(--mint)}
  .bio-metric.bad{border-color:rgba(255,122,144,.4)}
  .bio-metric.bad .bio-metric-val{color:#ff9ab0}

  .bio-mesh{
    position:absolute;inset:0;width:100%;height:100%;
    transform:scaleX(-1);transform-origin:center;
    pointer-events:none;
  }

  .bio-flash{
    position:absolute;inset:0;background:#fff;
    opacity:0;pointer-events:none;
    animation:bioFlash .7s ease;
  }
  @keyframes bioFlash{
    0%{opacity:0}15%{opacity:.85}100%{opacity:0}
  }
  .bio-captured-stamp{
    position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);
    padding:18px 26px;border-radius:12px;
    background:rgba(7,20,58,.75);
    border:1px solid var(--mint);
    color:var(--mint);
    font-size:11px;letter-spacing:.3em;text-transform:uppercase;
    box-shadow:0 0 40px rgba(158,240,201,.35);
    animation:stampIn .4s ease;
    text-align:center;
  }
  .bio-captured-stamp strong{
    display:block;font-family:var(--font-display);
    font-size:28px;font-weight:300;color:#fff;letter-spacing:.04em;
    margin-bottom:4px;
  }
  @keyframes stampIn{from{opacity:0;transform:translate(-50%,-50%) scale(.9)}to{opacity:1;transform:translate(-50%,-50%) scale(1)}}

  .bio-privacy{
    margin-top:10px;font-size:9px;letter-spacing:.18em;text-transform:uppercase;
    color:rgba(255,255,255,.5);text-align:center;
    display:flex;align-items:center;justify-content:center;gap:6px;
  }
  .bio-privacy::before{
    content:'';width:6px;height:6px;border-radius:50%;
    background:var(--mint);box-shadow:0 0 8px var(--mint);
  }

  @media (max-width: 768px){
    .bio-metric-lbl{font-size:7px;letter-spacing:.14em}
    .bio-metric-val{font-size:10px}
    .bio-prompt{font-size:10px;padding:6px 12px}
    .bio-step-pill{font-size:7px;padding:2px 7px}
    .bio-captured-stamp{padding:14px 18px}
    .bio-captured-stamp strong{font-size:22px}
  }

  /* ===================================================================== */
  /* Auth / Profile                                                        */
  /* ===================================================================== */

  /* Nav auth chip (sign-in button / email pill) */
  .nav-auth{
    display:flex;align-items:center;gap:8px;margin-left:8px;position:relative;
  }
  .nav-auth-btn{
    background:rgba(255,255,255,.06);
    border:1px solid rgba(255,255,255,.16);
    color:#fff;font-family:var(--font-body);
    font-size:11px;letter-spacing:.18em;text-transform:uppercase;
    padding:8px 16px;border-radius:999px;cursor:pointer;
    transition:background .2s, border-color .2s;
  }
  .nav-auth-btn:hover{
    background:rgba(255,255,255,.12);
    border-color:rgba(255,201,168,.45);
  }
  .nav-auth-chip{
    display:flex;align-items:center;gap:8px;
    background:rgba(255,255,255,.06);
    border:1px solid rgba(255,255,255,.16);
    color:#fff;font-family:var(--font-body);
    font-size:11px;letter-spacing:.08em;
    padding:6px 12px 6px 8px;border-radius:999px;cursor:pointer;
    transition:background .2s, border-color .2s;
  }
  .nav-auth-chip:hover{
    background:rgba(255,255,255,.1);
    border-color:rgba(255,201,168,.4);
  }
  .nav-auth-avatar{
    width:26px;height:26px;border-radius:50%;
    background:linear-gradient(135deg,var(--peach),#e8a58a);
    color:#2a1a14;font-family:var(--font-display);
    font-size:14px;font-weight:500;
    display:flex;align-items:center;justify-content:center;
    flex-shrink:0;
  }
  .nav-auth-email{
    max-width:180px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
    opacity:.85;
  }
  .nav-auth-caret{opacity:.6;font-size:9px;margin-left:2px}
  .nav-auth-menu{
    position:absolute;top:calc(100% + 10px);right:0;
    min-width:220px;z-index:60;
    background:rgba(20,14,18,.92);
    border:1px solid rgba(255,255,255,.12);
    border-radius:16px;
    backdrop-filter:blur(18px);
    -webkit-backdrop-filter:blur(18px);
    box-shadow:0 20px 60px rgba(0,0,0,.5);
    padding:8px;
    animation:navMenuIn .18s ease-out;
  }
  @keyframes navMenuIn{from{opacity:0;transform:translateY(-6px)}to{opacity:1;transform:translateY(0)}}
  .nav-auth-menu-email{

<!-- =========================================================================
     Supabase client  +  LumaAuth manager
     -------------------------------------------------------------------------
     • Free-tier Supabase (500 MB Postgres + 50k MAU, no credit card).
     • We store DERIVED data only (face shape, tone, prefs, saved products).
       No face image / landmarks / biometric template ever leaves the browser.
     • Auth: email + 6-digit PIN (Supabase requires min 6 chars → PIN fits).
     • Graceful degrade: if the two constants below are left blank, the app
       still works offline — auth + persistence just become no-ops.
     ======================================================================== -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
/* global window, supabase */
(function(){
  // ---- 1. PROJECT CONFIG --------------------------------------------------
  // Paste your values from Supabase Dashboard → Project Settings → API.
  // Leave blank to run LUMA fully offline (no cloud profile / no sync).
  window.LUMA_SUPABASE_URL      = window.LUMA_SUPABASE_URL      || 'https://nrktiytgofoxeonhmeln.supabase.co';
  window.LUMA_SUPABASE_ANON_KEY = window.LUMA_SUPABASE_ANON_KEY || 'sb_publishable_iIMLR6tt25emvO1vX3hdAQ_SLjBvqT0';

  // Single source of truth for site-wide config.
  // NOTE: adminEmail is ALSO hardcoded inside the `visits_select_admin` RLS
  //       policy in supabase-schema.sql (search "LUMA_ADMIN_EMAIL" there).
  //       If you change it here, update the SQL and re-run the schema.
  window.LUMA_CONFIG = window.LUMA_CONFIG || {
    adminEmail: 'kvboxberg9999@gmail.com'
  };

  // ---- 2. CLIENT (lazy) ---------------------------------------------------
  let _client = null;
  let _warned = false;
  function isConfigured(){
    return !!(window.LUMA_SUPABASE_URL && window.LUMA_SUPABASE_ANON_KEY);
  }
  function getClient(){
    if (_client) return _client;
    if (!isConfigured()) {
      if (!_warned) {
        _warned = true;
        console.info('[LUMA] Supabase not configured — running offline. '+
          'Set LUMA_SUPABASE_URL + LUMA_SUPABASE_ANON_KEY to enable profiles.');
      }
      return null;
    }
    if (!window.supabase || !window.supabase.createClient) {
      console.warn('[LUMA] supabase-js not loaded yet.');
      return null;
    }
    _client = window.supabase.createClient(
      window.LUMA_SUPABASE_URL,
      window.LUMA_SUPABASE_ANON_KEY,
      { auth: {
          persistSession: true,
          autoRefreshToken: true,
          detectSessionInUrl: true,   // auto-consume tokens from email links
          flowType: 'implicit'
        }
      }
    );
    return _client;
  }

  // When the user lands from an email verification / recovery link, Supabase
  // leaves a hash fragment behind (#access_token=…&type=signup). We expose a
  // tiny helper so the UI can detect that and show a friendly banner.
  function consumeAuthHash(){
    const h = (window.location.hash || '').replace(/^#/, '');
    if (!h) return null;
    const p = new URLSearchParams(h);
    const type = p.get('type');
    const err  = p.get('error_description') || p.get('error');
    if (!type && !err) return null;
    // Clean the URL so reloads don't re-trigger banners.
    try { history.replaceState(null, '', window.location.pathname + window.location.search); } catch(_) {}
    if (err) return { kind: 'error', message: err.replace(/\+/g,' ') };
    return { kind: type }; // 'signup' | 'recovery' | 'magiclink' | 'invite' | 'email_change'
  }

  // ---- 3. AUTH HELPERS ----------------------------------------------------
  function normEmail(e){ return (e||'').trim().toLowerCase(); }
  function validEmail(e){ return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(e); }
  function validPin(p){ return /^\d{6}$/.test(p||''); }

  async function signUp(email, pin, extra){
    const c = getClient();
    if (!c) return { error: { message: 'Cloud profile not configured.' } };
    email = normEmail(email);
    if (!validEmail(email)) return { error: { message: 'Please enter a valid email.' } };
    if (!validPin(pin))     return { error: { message: 'PIN must be exactly 6 digits.' } };
    const { data, error } = await c.auth.signUp({
      email, password: pin,
      options: { data: extra || {} }
    });
    return { data, error };
  }
  async function signIn(email, pin){
    const c = getClient();
    if (!c) return { error: { message: 'Cloud profile not configured.' } };
    email = normEmail(email);
    if (!validEmail(email)) return { error: { message: 'Please enter a valid email.' } };
    if (!validPin(pin))     return { error: { message: 'PIN must be exactly 6 digits.' } };
    const { data, error } = await c.auth.signInWithPassword({ email, password: pin });
    return { data, error };
  }
  async function signOut(){
    const c = getClient(); if (!c) return;
    await c.auth.signOut();
  }
  async function getSession(){
    const c = getClient(); if (!c) return null;
    const { data } = await c.auth.getSession();
    return data && data.session || null;
  }
  async function getUser(){
    const s = await getSession();
    return s && s.user || null;
  }
  function onAuthChange(cb){
    const c = getClient(); if (!c) return () => {};
    const { data } = c.auth.onAuthStateChange((event, session) => cb(session, event));
    return () => { try { data.subscription.unsubscribe(); } catch(_){} };
  }

  // ---- 4. DATA HELPERS (profiles / scans / prefs / saved_products) --------
  async function getProfile(){
    const c = getClient(); const u = await getUser();
    if (!c || !u) return null;
    const { data } = await c.from('profiles').select('*').eq('id', u.id).maybeSingle();
    return data || null;
  }
  async function updateProfile(patch){
    const c = getClient(); const u = await getUser();
    if (!c || !u) return { error: { message: 'Not signed in.' } };
    const { data, error } = await c.from('profiles').update(patch).eq('id', u.id).select().maybeSingle();
    return { data, error };
  }

  // Strips any accidental image/landmark fields just in case.
  function sanitizeScan(s){
    if (!s || typeof s !== 'object') return {};
    const out = {};
    const allow = [
      'face_shape','face_shape_sub',
      'tone_id','tone_name','tone_color','tone_undertone','ita','confidence',
      'skin_type','skin_type_sub',
      'liveness','expression','age'
    ];
    allow.forEach(k => { if (s[k] !== undefined) out[k] = s[k]; });
    return out;
  }
  async function insertScan(scan){
    const c = getClient(); const u = await getUser();
    if (!c || !u) return { error: { message: 'Not signed in.' } };
    const row = Object.assign({ profile_id: u.id }, sanitizeScan(scan));
    const { data, error } = await c.from('scans').insert(row).select().maybeSingle();
    return { data, error };
  }
  async function listScans(limit){
    const c = getClient(); const u = await getUser();
    if (!c || !u) return [];
    const { data } = await c.from('scans')
      .select('*').eq('profile_id', u.id)
      .order('created_at', { ascending: false })
      .limit(Math.max(1, Math.min(100, limit||20)));
    return data || [];
  }
  async function latestScan(){
    const rows = await listScans(1);
    return rows[0] || null;
  }

  async function getPreferences(){
    const c = getClient(); const u = await getUser();
    if (!c || !u) return null;
    const { data } = await c.from('preferences').select('*').eq('profile_id', u.id).maybeSingle();
    return data || null;
  }
  async function upsertPreferences(patch){
    const c = getClient(); const u = await getUser();
    if (!c || !u) return { error: { message: 'Not signed in.' } };
    const row = Object.assign({ profile_id: u.id, updated_at: new Date().toISOString() }, patch || {});
    let res = await c.from('preferences').upsert(row).select().maybeSingle();
    // If the server rejects an unknown column (e.g. `preferred_brands` before the
    // schema migration has been run), retry with that column stripped. Keeps
    // the UI working across old & new DB schemas.
    if (res.error && /preferred_brands/i.test(res.error.message || '')) {
      const { preferred_brands, ...rest } = row;
      res = await c.from('preferences').upsert(rest).select().maybeSingle();
    }
    return { data: res.data, error: res.error };
  }

  async function listSavedProducts(){
    const c = getClient(); const u = await getUser();
    if (!c || !u) return [];
    const { data } = await c.from('saved_products')
      .select('*').eq('profile_id', u.id)
      .order('saved_at', { ascending: false });
    return data || [];
  }
  async function addSavedProduct(brand, name){
    const c = getClient(); const u = await getUser();
    if (!c || !u) return { error: { message: 'Not signed in.' } };
    const { data, error } = await c.from('saved_products')
      .upsert({ profile_id: u.id, brand, name }).select().maybeSingle();
    return { data, error };
  }
  async function removeSavedProduct(brand, name){
    const c = getClient(); const u = await getUser();
    if (!c || !u) return { error: { message: 'Not signed in.' } };
    const { error } = await c.from('saved_products')
      .delete()
      .eq('profile_id', u.id).eq('brand', brand).eq('name', name);
    return { error };
  }

  // Permanently delete the signed-in user's account + all their data.
  // Uses the `public.delete_my_account()` RPC (SECURITY DEFINER, self-only).
  async function deleteMyAccount(){
    const c = getClient(); const u = await getUser();
    if (!c || !u) return { error: { message: 'Not signed in.' } };
    const { error } = await c.rpc('delete_my_account');
    if (error) return { error };
    // The JWT now points to a non-existent user; drop the local session.
    try { await c.auth.signOut(); } catch(_) {}
    return { error: null };
  }

  // ---- 4b. VISIT TRACKING + ANALYTICS -------------------------------------
  // Admin email who can see the analytics card in the profile tab. Pulled from
  // the single-source-of-truth LUMA_CONFIG above. The matching value ALSO
  // lives in supabase-schema.sql's `visits_select_admin` policy — keep in sync.
  const LUMA_ADMIN_EMAIL = (window.LUMA_CONFIG && window.LUMA_CONFIG.adminEmail) || 'kvboxberg9999@gmail.com';

  function isAdminUser(u){
    if (!u || !u.email) return false;
    return normEmail(u.email) === LUMA_ADMIN_EMAIL;
  }

  // Random per-tab id used to dedupe reloads within the same tab.
  function sessionIdOnce(){
    try {
      const KEY = 'luma:session_id';
      let sid = sessionStorage.getItem(KEY);
      if (!sid) {
        sid = (crypto && crypto.randomUUID) ? crypto.randomUUID()
              : ('s_' + Math.random().toString(36).slice(2) + Date.now().toString(36));
        sessionStorage.setItem(KEY, sid);
      }
      return sid;
    } catch(_) { return 's_' + Date.now().toString(36); }
  }

  // Coerce an arbitrary value to a safe string for storage: non-strings → null,
  // strip control chars and angle brackets, collapse whitespace, cap length.
  // We do this defensively because `geoLookup` pulls from a third-party API.
  function sanitizeGeoString(v, maxLen){
    if (typeof v !== 'string') return null;
    let s = v
      .replace(/[\u0000-\u001F\u007F]/g, '')        // control chars
      .replace(/[<>]/g, '')                         // defang HTML-ish markers
      .replace(/\s+/g, ' ')
      .trim();
    if (!s) return null;
    if (maxLen && s.length > maxLen) s = s.slice(0, maxLen);
    return s;
  }
  function sanitizeCountryCode(v){
    if (typeof v !== 'string') return null;
    const s = v.trim().toUpperCase();
    // ISO-3166 alpha-2 is exactly two letters. Reject anything else.
    return /^[A-Z]{2}$/.test(s) ? s : null;
  }

  async function geoLookup(){
    // ipapi.co — free tier, ~1k req/day, no API key, CORS-enabled.
    // Returns { country_name, country_code, city, region, ... }.
    // We validate the response shape and sanitize every field before storing
    // it, because the response is third-party data and we do NOT want an
    // upstream bug/breach to land raw strings in our DB.
    try {
      const res = await fetch('https://ipapi.co/json/', { cache: 'no-store' });
      if (!res.ok) return null;
      const j = await res.json();
      if (!j || typeof j !== 'object') return null;
      // Some providers signal rate-limit/error via an `error` field.
      if (j.error) return null;
      return {
        country:      sanitizeGeoString(j.country_name, 80),
        country_code: sanitizeCountryCode(j.country_code || j.country),
        city:         sanitizeGeoString(j.city, 80),
        region:       sanitizeGeoString(j.region, 80)
      };
    } catch(_) { return null; }
  }

  // Strip Supabase-style auth tokens from a URL hash before we persist it.
  // When a user arrives from an email verification / recovery / magic-link
  // flow, location.hash looks like:
  //   #access_token=ey…&refresh_token=…&expires_in=3600&type=recovery
  // We do NOT want those tokens sitting in the visits table at rest.
  function sanitizeHash(hash){
    if (!hash) return '';
    // Remove leading '#'
    const h = hash.replace(/^#/, '');
    // Fast path: no key=value pairs → safe to keep verbatim (e.g. "#profile")
    if (!/[=&]/.test(h)) return '#' + h;
    const BLOCKED = new Set([
      'access_token','refresh_token','id_token','provider_token',
      'provider_refresh_token','token','apikey','authorization'
    ]);
    const kept = [];
    for (const part of h.split('&')) {
      const [rawKey] = part.split('=');
      const key = (rawKey || '').toLowerCase();
      if (!key) continue;
      if (BLOCKED.has(key)) continue;
      kept.push(part);
    }
    return kept.length ? '#' + kept.join('&') : '';
  }

  // Log a visit. Safe to call on every page load — we gate against reloads
  // via sessionStorage so one tab session == one row.
  async function trackVisit(){
    const c = getClient();
    if (!c) return;
    try {
      const SEEN = 'luma:visit_logged';
      if (sessionStorage.getItem(SEEN)) return;
      sessionStorage.setItem(SEEN, '1');

      const geo = await geoLookup() || {};
      const safePath = ((location.pathname || '/') + sanitizeHash(location.hash || '')).slice(0, 300);
      const safeReferrer = (document.referrer || '').slice(0, 500) || null;
      const row = {
        country:      geo.country      || null,
        country_code: geo.country_code || null,
        city:         geo.city         || null,
        region:       geo.region       || null,
        path:         safePath,
        referrer:     safeReferrer,
        session_id:   sessionIdOnce()
      };
      // Fire and forget — don't block UI on analytics.
      await c.from('visits').insert(row);
    } catch(e) {
      // Never break the site over analytics.
      console.debug('[LUMA] visit log skipped:', e && e.message);
    }
  }

  // Admin-only analytics summary. Returns null for non-admins or if offline.
  //   { todayCount, last7Count, topCountries: [{country, country_code, count}] }
  async function getVisitAnalytics(){
    const c = getClient();
    const u = await getUser();
    if (!c || !isAdminUser(u)) return null;

    const now = new Date();
    const startOfToday = new Date(now.getFullYear(), now.getMonth(), now.getDate()).toISOString();
    const sevenDaysAgo = new Date(now.getTime() - 7*24*60*60*1000).toISOString();

    try {
      // Today count
      const today = await c.from('visits')
        .select('id', { count: 'exact', head: true })
        .gte('created_at', startOfToday);

      // Last-7 count
      const week = await c.from('visits')
        .select('id', { count: 'exact', head: true })
        .gte('created_at', sevenDaysAgo);

      // Top countries (last 7 days). We aggregate client-side — the row set is
      // small and it avoids needing a SQL view.
      const rows = await c.from('visits')
        .select('country, country_code')
        .gte('created_at', sevenDaysAgo)
        .limit(5000);

      const tally = new Map();
      (rows.data || []).forEach(r => {
        const key = (r.country_code || r.country || 'Unknown');
        const cur = tally.get(key) || { country: r.country || key, country_code: r.country_code || null, count: 0 };
        cur.count += 1;
        tally.set(key, cur);
      });
      const topCountries = Array.from(tally.values())
        .sort((a, b) => b.count - a.count)
        .slice(0, 8);

      return {
        todayCount:  today.count  || 0,
        last7Count:  week.count   || 0,
        topCountries
      };
    } catch(e) {
      console.warn('[LUMA] analytics failed:', e && e.message);
      return null;
    }
  }

  // ---- 5. EXPORT ----------------------------------------------------------
  window.LumaAuth = {
    isConfigured, getClient,
    signUp, signIn, signOut, getSession, getUser, onAuthChange,
    getProfile, updateProfile,
    insertScan, listScans, latestScan,
    getPreferences, upsertPreferences,
    listSavedProducts, addSavedProduct, removeSavedProduct,
    deleteMyAccount,
    consumeAuthHash,
    // analytics
    trackVisit, getVisitAnalytics, isAdminUser, LUMA_ADMIN_EMAIL,
    // utils (exposed for UI validation)
    validEmail, validPin, normEmail,
  };

  // Fire-and-forget: log this visit as soon as supabase-js is ready.
  if (isConfigured()) {
    // Defer until idle so we don't compete with first paint.
    const kick = () => { trackVisit(); };
    if ('requestIdleCallback' in window) requestIdleCallback(kick, { timeout: 2500 });
    else setTimeout(kick, 1200);
  }
})();
</script>
<script type="text/babel" data-presets="react" data-label="Nav">
(function(){
/* global React */
const { useState, useEffect, useRef } = React;

function initialOf(email){
  if (!email) return '?';
  const c = email.trim()[0];
  return c ? c.toUpperCase() : '?';
}

function Nav({ user, route, onNavigate, onRequestSignIn, onSignOut }) {
  const [menuOpen, setMenuOpen] = useState(false);
  const [authMenuOpen, setAuthMenuOpen] = useState(false);
  const close = () => setMenuOpen(false);
  const authMenuRef = useRef(null);

  // Close mobile menu when viewport grows beyond mobile breakpoint
  useEffect(() => {
    function onResize() { if (window.innerWidth > 640) setMenuOpen(false); }
    window.addEventListener('resize', onResize);
    return () => window.removeEventListener('resize', onResize);
  }, []);

  // Close on Escape
  useEffect(() => {
    function onKey(e){ if(e.key === 'Escape') { setMenuOpen(false); setAuthMenuOpen(false); } }
    window.addEventListener('keydown', onKey);
    return () => window.removeEventListener('keydown', onKey);
  }, []);

  // Close auth menu on outside click
  useEffect(() => {
    if (!authMenuOpen) return;
    function onDoc(e){
      if (authMenuRef.current && !authMenuRef.current.contains(e.target)) setAuthMenuOpen(false);
    }
    document.addEventListener('mousedown', onDoc);
    return () => document.removeEventListener('mousedown', onDoc);
  }, [authMenuOpen]);

  function nav(target, e){
    if (e) e.preventDefault();
    close();
    setAuthMenuOpen(false);
    onNavigate && onNavigate(target);
  }

  function handleProfileClick(e){
    if (e) e.preventDefault();
    close();
    if (user) onNavigate && onNavigate('profile');
    else onRequestSignIn && onRequestSignIn('signin');
  }

  return (
    <nav className="luma-nav">
      <a className="luma-logo" href="#" onClick={(e)=>nav('home', e)}>L<span>UM</span>A</a>
      <ul className={'luma-nav-links' + (menuOpen ? ' open' : '')}>
        <li><a href="#" onClick={(e)=>nav('home', e)}>Scanner</a></li>
        <li><a href="#" onClick={(e)=>nav('home', e)}>Products</a></li>
        <li><a href="#" onClick={(e)=>nav('brands', e)}>Brands</a></li>
        <li><a href="#" onClick={handleProfileClick}>My Profile</a></li>
      </ul>

      <div className="nav-auth" ref={authMenuRef}>
        {user ? (
          <>
            <button className="nav-auth-chip" onClick={()=>setAuthMenuOpen(o=>!o)} aria-haspopup="true" aria-expanded={authMenuOpen}>
              <span className="nav-auth-avatar">{initialOf(user.email)}</span>
              <span className="nav-auth-email">{user.email}</span>
              <span className="nav-auth-caret">▾</span>
            </button>
            {authMenuOpen && (
              <div className="nav-auth-menu" role="menu">
                <div className="nav-auth-menu-email">{user.email}</div>
                <button role="menuitem" onClick={()=>{setAuthMenuOpen(false); onNavigate && onNavigate('profile');}}>My Profile</button>
                <button role="menuitem" onClick={()=>{setAuthMenuOpen(false); onNavigate && onNavigate('brands');}}>Brands</button>
                <button role="menuitem" onClick={()=>{setAuthMenuOpen(false); onNavigate && onNavigate('home');}}>Scanner</button>
                <button role="menuitem" className="danger" onClick={()=>{setAuthMenuOpen(false); onSignOut && onSignOut();}}>Sign out</button>
              </div>
            )}
          </>
        ) : (
          <button className="nav-auth-btn" onClick={()=>onRequestSignIn && onRequestSignIn('signin')}>Sign in</button>
        )}
      </div>

      <button
        className="nav-hamburger"
        aria-label={menuOpen ? 'Close menu' : 'Open menu'}
        aria-expanded={menuOpen}
        onClick={() => setMenuOpen(o => !o)}>
        {menuOpen ? (
          <svg viewBox="0 0 24 24"><path d="M6 6L18 18M6 18L18 6"/></svg>
        ) : (
          <svg viewBox="0 0 24 24"><path d="M4 7H20M4 12H20M4 17H20"/></svg>
        )}
      </button>
    </nav>
  );
}

window.LumaNav = Nav;

})();
